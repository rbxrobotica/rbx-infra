# Workflow: Promote Image Tag
# Triggered by repository_dispatch from application repositories.
# Opens a promotion PR instead of writing directly to main.
name: Promote Image Tag

on:
  repository_dispatch:
    types: [image-updated]
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name to update'
        required: true
      tag:
        description: 'New tag for the image'
        required: true
      app:
        description: 'Application name'
        required: true

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  promote-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rbx-infra
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve promotion request
        id: request
        run: |
          APP="${{ github.event.client_payload.app }}"
          IMAGE="${{ github.event.client_payload.image }}"
          TAG="${{ github.event.client_payload.tag }}"

          if [ -z "$APP" ]; then APP="${{ inputs.app }}"; fi
          if [ -z "$IMAGE" ]; then IMAGE="${{ inputs.image }}"; fi
          if [ -z "$TAG" ]; then TAG="${{ inputs.tag }}"; fi

          TAG_ONLY="${TAG##*:}"

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_ONLY" >> "$GITHUB_OUTPUT"
          echo "kustomization=apps/prod/${APP}/kustomization.yml" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for manifest verification
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Validate and update kustomization
        run: |
          CHECK_REGISTRY=1 bash scripts/promote-image-tag.sh \
            "${{ steps.request.outputs.app }}" \
            "${{ steps.request.outputs.image }}" \
            "${{ steps.request.outputs.tag }}"

      - name: Run image convention checks
        run: |
          bash scripts/check-image-convention.sh "${{ steps.request.outputs.kustomization }}"

      - name: Open promotion PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APP="${{ steps.request.outputs.app }}"
          IMAGE="${{ steps.request.outputs.image }}"
          TAG="${{ steps.request.outputs.tag }}"
          BRANCH="image-promotion/${APP}/${TAG}-${GITHUB_RUN_ID}"

          if git diff --quiet; then
            echo "No promotion diff generated."
            exit 0
          fi

          git switch -c "$BRANCH"
          git add "apps/prod/${APP}/kustomization.yml"
          git commit -m "chore(${APP}): promote image ${TAG}"
          git push --set-upstream origin "$BRANCH"

          BODY_FILE="${RUNNER_TEMP}/promotion-pr-body.md"
          {
            echo "Automated image promotion request."
            echo
            echo "- App: ${APP}"
            echo "- Image: ${IMAGE}"
            echo "- Tag: ${TAG}"
            echo "- Registry check: passed via docker manifest inspect"
            echo "- Cluster action: none; ArgoCD sync remains separate and human-gated where required."
          } > "$BODY_FILE"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(${APP}): promote ${IMAGE} to ${TAG}" \
            --body-file "$BODY_FILE"

  notify:
    needs: promote-image
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Image promotion workflow completed with status: ${{ needs.promote-image.result }}"
