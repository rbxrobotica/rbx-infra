# Workflow: Validate Manifests
# Runs on pull requests to validate Kubernetes manifests
name: Validate Manifests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint .

      - name: Setup kubeconform
        run: |
          curl -Lo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: |
          # Exclude archived manifests (not deployed) and skip HTTPRoute (Gateway
          # API CRD with no standard json-schema - its schema URL 400s and trips
          # kubeconform's error exit instead of -ignore-missing-schemas).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            mapfile -t manifests < <(
              git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}...HEAD" -- apps core gitops platform |
                grep -E '\.(yml|yaml)$' |
                grep -v '/archived/' ||
                true
            )
          else
            mapfile -t manifests < <(
              find apps core gitops platform -type f \( -name "*.yml" -o -name "*.yaml" \) \
                -not -path "*/archived/*"
            )
          fi

          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No Kubernetes manifests to validate."
            exit 0
          fi

          printf 'Validating %d manifest(s):\n' "${#manifests[@]}"
          printf '  - %s\n' "${manifests[@]}"
          kubeconform -ignore-missing-schemas -skip HTTPRoute -summary -output json "${manifests[@]}"

      - name: Validate rendered production overlays
        run: |
          kubectl kustomize apps/prod/lda-prod >/dev/null
          kubectl kustomize apps/prod/rbx-catalog >/dev/null
          kubectl kustomize apps/prod/rbxsystems-ch >/dev/null
          kubectl kustomize apps/prod/strategos >/dev/null

  validate-argocd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup argocd
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Validate ArgoCD Applications
        run: |
          echo "Validating ArgoCD Application manifests..."
          find gitops -name "*.yml" -o -name "*.yaml" | while read file; do
            echo "Checking: $file"
            # Basic validation - argocd requires cluster connection for full validation
          done

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  convention-lint:
    # Pattern R enforcement on the app manifests a PR changes (blocks NEW
    # non-conformance; the pre-existing backlog is untouched).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main

      - name: Pattern R image convention (changed apps/ manifests)
        run: |
          mapfile -t FILES < <(git diff --name-only --diff-filter=AM origin/main...HEAD -- apps/ | grep -E '\.(yml|yaml)$' || true)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No changed app manifests — skipping."
            exit 0
          fi
          printf 'Checking %d changed manifest(s):\n' "${#FILES[@]}"
          printf '  - %s\n' "${FILES[@]}"
          bash scripts/check-image-convention.sh "${FILES[@]}"

      - name: P1 image-promotion debt report
        run: |
          bash scripts/report-p1-image-debt.sh
