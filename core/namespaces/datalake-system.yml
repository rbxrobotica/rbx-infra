# Namespace: datalake-system
# Purpose: Deep storage infrastructure (Hive Metastore, Spark driver coordination)
# ADR-0013: Deep Storage Architecture
---
apiVersion: v1
kind: Namespace
metadata:
  name: datalake-system
  labels:
    name: datalake-system
    purpose: deep-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: datalake-system-quota
  namespace: datalake-system
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    persistentvolumeclaims: "5"
    requests.storage: 50Gi
    services: "10"
    pods: "20"
    secrets: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: datalake-system-limit-range
  namespace: datalake-system
spec:
  limits:
  - default:
      cpu: 500m
      memory: 1Gi
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    max:
      cpu: 1000m
      memory: 2Gi
    min:
      cpu: 50m
      memory: 128Mi
    type: Container
  - max:
      storage: 30Gi
    min:
      storage: 1Gi
    type: PersistentVolumeClaim
