# Namespace: agent-missions
# Purpose: Agent Loop mission lifecycle workflows (Argo Workflows runs only —
#          no coding agents, no LLM calls, no repository code; lifecycle HTTP
#          steps and suspend nodes only)
# ADR-0008: Argo Workflows as the Agent Loop mission control plane
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-missions
  labels:
    name: agent-missions
    purpose: agent-loop-lifecycle
    app.kubernetes.io/part-of: agent-loop
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-missions-quota
  namespace: agent-missions
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    persistentvolumeclaims: "0"
    requests.storage: "0"
    services: "0"
    pods: "20"
    secrets: "5"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: agent-missions-limit-range
  namespace: agent-missions
spec:
  limits:
  - default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    max:
      cpu: 500m
      memory: 512Mi
    min:
      cpu: 10m
      memory: 16Mi
    type: Container
