# Namespace: analytics-jobs
# Purpose: Spark jobs (bronze/silver/gold ingestion and transformation)
# ADR-0013: Deep Storage Architecture
---
apiVersion: v1
kind: Namespace
metadata:
  name: analytics-jobs
  labels:
    name: analytics-jobs
    purpose: analytics
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: analytics-jobs-quota
  namespace: analytics-jobs
spec:
  hard:
    requests.cpu: "5"
    requests.memory: 14Gi
    limits.cpu: "7"
    limits.memory: 18Gi
    persistentvolumeclaims: "2"
    requests.storage: 10Gi
    services: "5"
    pods: "50"
    secrets: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: analytics-jobs-limit-range
  namespace: analytics-jobs
spec:
  limits:
  - default:
      cpu: 2000m
      memory: 6Gi
    defaultRequest:
      cpu: 1000m
      memory: 3Gi
    max:
      cpu: 3000m
      memory: 8Gi
    min:
      cpu: 100m
      memory: 512Mi
    type: Container
  - max:
      storage: 5Gi
    min:
      storage: 1Gi
    type: PersistentVolumeClaim
