# ArgoCD Application: Istio Ambient Mode
# Service mesh without sidecars
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ambient
  namespace: argocd
  labels:
    app.kubernetes.io/name: istio-ambient
    app.kubernetes.io/component: platform
    app.kubernetes.io/part-of: rbx-infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: rbx-platform

  source:
    repoURL: https://github.com/ldamasio/rbx-infra
    targetRevision: main
    path: platform/istio-ambient
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
