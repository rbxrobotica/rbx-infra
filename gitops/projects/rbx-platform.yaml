# ArgoCD AppProject: rbx-platform
# Manages cluster-wide platform services (ArgoCD, cert-manager, Istio, etc.)
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rbx-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-platform
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: rbx-infra
spec:
  description: Platform services and cluster-wide configurations

  # Source repositories
  sourceRepos:
    - https://github.com/ldamasio/rbx-infra
    - https://argoproj.github.io/argo-helm
    - https://charts.jetstack.io
    - https://istio-release.storage.googleapis.com/charts

  # Destination clusters and namespaces
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: istio-system
      server: https://kubernetes.default.svc
    - namespace: external-dns
      server: https://kubernetes.default.svc
    - namespace: '*'
      server: https://kubernetes.default.svc

  # Cluster resources allowed
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  # Namespaced resources allowed
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Roles for platform access
  roles:
    - name: admin
      description: Platform administrators with full access
      policies:
        - p, proj:rbx-platform:admin, applications, *, rbx-platform/*, allow
        - p, proj:rbx-platform:admin, exec, *, rbx-platform/*, allow
      groups:
        - rbx:platform-admins
