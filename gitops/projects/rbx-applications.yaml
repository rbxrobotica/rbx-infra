apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rbx-applications
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-applications
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: rbx-infra
spec:
  description: Product application deployments
  sourceRepos:
    - https://github.com/rbxrobotica/rbx-infra
    # Langfuse self-hosted (rbx-observability trace backend) Helm chart repo.
    - https://langfuse.github.io/langfuse-k8s
    # ZITADEL self-hosted Helm chart repo for RBX Identity.
    - https://charts.zitadel.com
  destinations:
    - namespace: robson
      server: https://kubernetes.default.svc
    - namespace: lda-prod
      server: https://kubernetes.default.svc
    - namespace: rbx-ia-br
      server: https://kubernetes.default.svc
    - namespace: rbx-catalog
      server: https://kubernetes.default.svc
    - namespace: rbx-cms
      server: https://kubernetes.default.svc
    - namespace: rbx-comms
      server: https://kubernetes.default.svc
    - namespace: rbx-console
      server: https://kubernetes.default.svc
    - namespace: rbx-portal
      server: https://kubernetes.default.svc
    - namespace: rbxsystems-ch
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: strategos
      server: https://kubernetes.default.svc
    - namespace: thalamus
      server: https://kubernetes.default.svc
    - namespace: websites
      server: https://kubernetes.default.svc
    - namespace: truthmetal
      server: https://kubernetes.default.svc
    - namespace: argos-radar
      server: https://kubernetes.default.svc
    - namespace: robson-testnet
      server: https://kubernetes.default.svc
    - namespace: llm-gateway
      server: https://kubernetes.default.svc
    - namespace: eden
      server: https://kubernetes.default.svc
    - namespace: rbx-commerce
      server: https://kubernetes.default.svc
    - namespace: rbx-eden-system-creator
      server: https://kubernetes.default.svc
    - namespace: rbx-maestro
      server: https://kubernetes.default.svc
    - namespace: rbx-identity
      server: https://kubernetes.default.svc
    # Thalamus slim-down reorg services (ADR-0200/0300/0201) + Langfuse backend.
    - namespace: langfuse
      server: https://kubernetes.default.svc
    - namespace: rbx-memory
      server: https://kubernetes.default.svc
    - namespace: rbx-observability
      server: https://kubernetes.default.svc
    - namespace: rbx-data
      server: https://kubernetes.default.svc
    - namespace: rbx-market-briefing
      server: https://kubernetes.default.svc
    - namespace: rbx-commerce-sandbox
      server: https://kubernetes.default.svc
    # Merovelis public institutional site (merovelis.com).
    - namespace: merovelis
      server: https://kubernetes.default.svc
    # rbx-ledger: isolated financial domain (dedicated namespace, not shared staging).
    - namespace: rbx-ledger
      server: https://kubernetes.default.svc
    # md-prec-kulinaryos: RBX MPBIC pricing model (internal tool).
    - namespace: md-prec-kulinaryos
      server: https://kubernetes.default.svc
    # Corbetti agent ServiceAccounts home (ADR-0500 Amendment 2026-07 / AGENT-KUBE-001).
    # Namespace is inert (SAs hold no RoleBindings here); they bind cross-namespace.
    - namespace: corbetti-agents
      server: https://kubernetes.default.svc
    # BTCPay Server (ADR-0009 Layer 2).
    - namespace: rbx-payments
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: networking.k8s.io
      kind: IngressClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: developer
      description: Developers with namespace-scoped access
      policies:
        - p, proj:rbx-applications:developer, applications, get,
          rbx-applications/*, allow
        - p, proj:rbx-applications:developer, applications, sync,
          rbx-applications/*, allow
        - p, proj:rbx-applications:developer, exec, *, rbx-applications/*, allow
        - p, proj:rbx-applications:developer, logs, get, rbx-applications/*,
          allow
      groups:
        - rbx:developers
