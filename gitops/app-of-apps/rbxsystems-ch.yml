# ArgoCD Application: rbxsystems-ch (rbxsystems.ch — site internacional)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbxsystems-ch
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbxsystems-ch
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: rbxsystems-ch
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/rbxsystems-ch

  destination:
    server: https://kubernetes.default.svc
    namespace: rbxsystems-ch

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
