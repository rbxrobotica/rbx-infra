# ArgoCD Application: Merovelis Production (public institutional site)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: merovelis-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: merovelis-prod
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: merovelis
  annotations:
    # ArgoCD Image Updater: watch the org image and write the promoted sha tag
    # into apps/prod/merovelis/kustomization.yml. Write-back reuses the fleet
    # credential rbx/github/rbx-infra-image-updater (argocd-image-updater-git-creds).
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/rbxrobotica/merovelis-site
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^sha-[0-9a-f]+$
    argocd-image-updater.argoproj.io/app.kustomize.image-name: ghcr.io/rbxrobotica/merovelis-site
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: kustomization
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/merovelis

  destination:
    server: https://kubernetes.default.svc
    namespace: merovelis

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
