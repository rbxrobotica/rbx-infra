# ArgoCD Application: rbx-cms (content management for rbx-robotica-frontend)
# Namespace: rbx-cms
# Two containers: rbx-cms-web (node, public cms.rbxsystems.ch) + rbx-cms-backend (Go, internal).
# Blocked until: repo+image exist, rbx-cms-secrets + contabo-s3-credentials in rbx-ia-br,
# OIDC client at auth.merovelis.com, cms DB on jaguar, DNS cms.rbxsystems.ch.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbx-cms
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-cms
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: rbx-cms
  annotations:
    # ArgoCD Image Updater: watch both images (built from the same commit) and
    # write the promoted sha tag into apps/prod/rbx-cms/kustomization.yml.
    # Write-back reuses the fleet credential rbx/github/rbx-infra-image-updater
    # (argocd-image-updater-git-creds). See docs/infra/IMAGE-PROMOTION.md.
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/rbxrobotica/rbx-cms, web=ghcr.io/rbxrobotica/rbx-cms-web
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/web.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^sha-[0-9a-f]+$
    argocd-image-updater.argoproj.io/web.allow-tags: regexp:^sha-[0-9a-f]+$
    argocd-image-updater.argoproj.io/app.kustomize.image-name: ghcr.io/rbxrobotica/rbx-cms
    argocd-image-updater.argoproj.io/web.kustomize.image-name: ghcr.io/rbxrobotica/rbx-cms-web
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: kustomization
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/rbx-cms

  destination:
    server: https://kubernetes.default.svc
    namespace: rbx-cms

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
