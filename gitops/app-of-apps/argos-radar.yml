# ArgoCD Application: argos-radar
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argos-radar
  namespace: argocd
  labels:
    app.kubernetes.io/name: argos-radar
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: argos-radar
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/argos-radar

  destination:
    server: https://kubernetes.default.svc
    namespace: argos-radar

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
