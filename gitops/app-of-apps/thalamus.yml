# ArgoCD Application: thalamus
# Institutional LLM control plane (inline mediated mode) — pilot deployment.
# NO automated sync: first sync is a manual, observed action (§4 staged
# rollout: observe -> deploy -> shadow -> pilot). No public ingress.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: thalamus
  namespace: argocd
  labels:
    app.kubernetes.io/name: thalamus
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: thalamus
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/thalamus

  destination:
    server: https://kubernetes.default.svc
    namespace: thalamus

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
