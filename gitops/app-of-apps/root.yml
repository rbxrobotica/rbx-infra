# Root Application (App of Apps Pattern)
# This is the entry point for all ArgoCD applications in the cluster.
# ArgoCD will sync this Application, which creates all child Applications.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/name: root
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: rbx-infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/ldamasio/rbx-infra
    targetRevision: main
    path: gitops/app-of-apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
