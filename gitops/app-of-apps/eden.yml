apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eden
  namespace: argocd
  labels:
    app.kubernetes.io/name: eden
    app.kubernetes.io/part-of: eden
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications
  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/eden
  destination:
    server: https://kubernetes.default.svc
    namespace: eden
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
