# ArgoCD Application: rbx-ia-br (rbx.ia.br — site nacional)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbx-ia-br
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-ia-br
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: rbx-ia-br
  annotations:
    # ArgoCD Image Updater: watch the org image and write the promoted sha tag
    # into apps/prod/rbx-ia-br/kustomization.yml. Write-back reuses the fleet
    # credential rbx/github/rbx-infra-image-updater (argocd-image-updater-git-creds).
    # Replaces the legacy CI self-push (INFRA_DEPLOY_KEY) promotion.
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/rbxrobotica/rbx-ia-br
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^sha-[0-9a-f]+$
    argocd-image-updater.argoproj.io/app.kustomize.image-name: ghcr.io/rbxrobotica/rbx-ia-br
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: kustomization
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/rbx-ia-br

  destination:
    server: https://kubernetes.default.svc
    namespace: rbx-ia-br

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
