# ArgoCD Application: Robson Production
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robson-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: robson-prod
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: robson
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/robson

  destination:
    server: https://kubernetes.default.svc
    namespace: robson

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: robson-paradedb
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
