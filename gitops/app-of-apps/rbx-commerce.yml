# ArgoCD Application: rbx-commerce
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbx-commerce
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-commerce
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: rbx-commerce
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/rbx-commerce

  destination:
    server: https://kubernetes.default.svc
    namespace: rbx-commerce

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
