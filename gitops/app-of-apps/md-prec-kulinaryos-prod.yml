# ArgoCD Application: md-prec-kulinaryos Production
# RBX MPBIC — internal pricing/complexity model (SvelteKit adapter-node).
# Registered automatically by the root app-of-apps (gitops/app-of-apps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: md-prec-kulinaryos-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: md-prec-kulinaryos-prod
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: md-prec-kulinaryos
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/md-prec-kulinaryos

  destination:
    server: https://kubernetes.default.svc
    namespace: md-prec-kulinaryos

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
