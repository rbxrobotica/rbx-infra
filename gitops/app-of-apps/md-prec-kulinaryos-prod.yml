# ArgoCD Application: md-prec-kulinaryos Production
# RBX MPBIC — internal pricing/complexity model (SvelteKit adapter-node).
# Registered automatically by the root app-of-apps (gitops/app-of-apps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: md-prec-kulinaryos-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: md-prec-kulinaryos-prod
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: md-prec-kulinaryos
  annotations:
    # ArgoCD Image Updater: watch the org image and write the promoted sha tag
    # into apps/prod/md-prec-kulinaryos/kustomization.yml. Write-back reuses the
    # fleet credential rbx/github/rbx-infra-image-updater (argocd-image-updater-git-creds).
    # See docs/infra/IMAGE-PROMOTION.md.
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/rbxrobotica/md-prec-kulinaryos
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^sha-[0-9a-f]+$
    argocd-image-updater.argoproj.io/app.kustomize.image-name: ghcr.io/rbxrobotica/md-prec-kulinaryos
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: kustomization
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/md-prec-kulinaryos

  destination:
    server: https://kubernetes.default.svc
    namespace: md-prec-kulinaryos

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
