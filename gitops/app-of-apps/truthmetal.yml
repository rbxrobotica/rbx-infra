# ArgoCD Application: truthmetal
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: truthmetal
  namespace: argocd
  labels:
    app.kubernetes.io/name: truthmetal
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: truthmetal
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/ldamasio/rbx-infra
    targetRevision: main
    path: apps/prod/truthmetal

  destination:
    server: https://kubernetes.default.svc
    namespace: truthmetal

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
