# ArgoCD Application: RBX Identity
# Canonical identity provider for RBX production auth.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbx-identity
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-identity
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: rbx-identity
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://charts.zitadel.com
    chart: zitadel
    targetRevision: 9.34.0
    helm:
      releaseName: rbx-identity
      values: |
        replicaCount: 2

        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: auth.merovelis.com
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: zitadel-tls
              hosts:
                - auth.merovelis.com

        login:
          ingress:
            enabled: true
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - host: auth.merovelis.com
                paths:
                  - path: /ui/v2/login
                    pathType: Prefix
            tls:
              - secretName: zitadel-tls
                hosts:
                  - auth.merovelis.com

        zitadel:
          masterkeySecretName: zitadel-masterkey
          configmapConfig:
            ExternalDomain: auth.merovelis.com
            ExternalPort: 443
            ExternalSecure: true
            TLS:
              Enabled: false
            Database:
              Postgres:
                Host: 161.97.147.76
                Port: 5432
                Database: zitadel
                MaxOpenConns: 20
                MaxIdleConns: 10
                MaxConnLifetime: 30m
                MaxConnIdleTime: 5m
                User:
                  Username: zitadel
                  SSL:
                    Mode: require
                Admin:
                  Username: zitadel_admin
                  SSL:
                    Mode: require
          configSecretName: zitadel-config
          initJob:
            enabled: true
            command: "zitadel"

        extraManifests:
          # The commerce entitlement gate uses a mirrored service-account secret
          # from rbx-ia-br. The operator must provision the remote secret named
          # rbx-session-bff-commerce with RBX_COMMERCE_CLIENT_ID,
          # RBX_COMMERCE_CLIENT_SECRET, RBX_COMMERCE_MACHINE_KEY_JSON, and
          # RBX_COMMERCE_AUDIENCE.
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: external-secrets-reader
              namespace: rbx-identity

          - apiVersion: external-secrets.io/v1
            kind: SecretStore
            metadata:
              name: kubernetes-store
              namespace: rbx-identity
            spec:
              provider:
                kubernetes:
                  auth:
                    serviceAccount:
                      name: external-secrets-reader
                  remoteNamespace: rbx-ia-br
                  server:
                    caProvider:
                      key: ca.crt
                      name: kube-root-ca.crt
                      type: ConfigMap
                    url: https://kubernetes.default.svc.cluster.local

          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: rbx-session-bff-commerce
              namespace: rbx-identity
            spec:
              refreshInterval: 15m
              secretStoreRef:
                name: kubernetes-store
                kind: SecretStore
              target:
                name: rbx-session-bff-commerce
                creationPolicy: Owner
              data:
                - secretKey: RBX_COMMERCE_CLIENT_ID
                  remoteRef:
                    key: rbx-session-bff-commerce
                    property: RBX_COMMERCE_CLIENT_ID
                - secretKey: RBX_COMMERCE_CLIENT_SECRET
                  remoteRef:
                    key: rbx-session-bff-commerce
                    property: RBX_COMMERCE_CLIENT_SECRET
                - secretKey: RBX_COMMERCE_MACHINE_KEY_JSON
                  remoteRef:
                    key: rbx-session-bff-commerce
                    property: RBX_COMMERCE_MACHINE_KEY_JSON
                - secretKey: RBX_COMMERCE_AUDIENCE
                  remoteRef:
                    key: rbx-session-bff-commerce
                    property: RBX_COMMERCE_AUDIENCE

          - apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: read-rbx-session-bff-commerce
              namespace: rbx-ia-br
            rules:
              - apiGroups: [""]
                resources: ["secrets"]
                resourceNames:
                  - rbx-session-bff-commerce
                verbs: ["get"]

          - apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: read-rbx-session-bff-commerce
              namespace: rbx-ia-br
            subjects:
              - kind: ServiceAccount
                name: external-secrets-reader
                namespace: rbx-identity
            roleRef:
              kind: Role
              name: read-rbx-session-bff-commerce
              apiGroup: rbac.authorization.k8s.io

          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: rbx-session-bff
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-session-bff
                app.kubernetes.io/component: session-bff
                app.kubernetes.io/part-of: rbx-identity
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app.kubernetes.io/name: rbx-session-bff
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: rbx-session-bff
                    app.kubernetes.io/component: session-bff
                    app.kubernetes.io/part-of: rbx-identity
                spec:
                  imagePullSecrets:
                    - name: ghcr-pull-secret
                  containers:
                    - name: rbx-session-bff
                      image: ghcr.io/rbxrobotica/rbx-session-bff:sha-70577f0
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 8081
                          name: http
                      envFrom:
                        - secretRef:
                            name: rbx-session-bff-commerce
                      env:
                        # Strategos uses the canonical Hub entrypoint
                        # app.merovelis.com/strategos and same-origin auth
                        # adapter routes under app.merovelis.com/api/auth/*.
                        - name: RBX_IDENTITY_ISSUER
                          value: https://auth.merovelis.com
                        - name: RBX_SESSION_BFF_DISCOVER_OIDC
                          value: "true"
                        - name: RBX_SESSION_BFF_CLIENT_ID
                          value: "376903619468855423"
                        - name: RBX_SESSION_BFF_REDIRECT_URI
                          value: https://app.merovelis.com/api/auth/callback
                        - name: RBX_SESSION_BFF_BIND_ADDR
                          value: 0.0.0.0:8081
                        - name: RBX_COMMERCE_BASE_URL
                          value: http://rbx-commerce.rbx-commerce.svc.cluster.local
                        - name: RBX_COMMERCE_TOKEN_ENDPOINT
                          value: https://auth.merovelis.com/oauth/v2/token
                        - name: RBX_COMMERCE_SCOPES
                          value: openid service:commerce.read
                        - name: RBX_COMMERCE_TOKEN_EXCHANGE_CLIENT_ID
                          value: "376903619468855423"
                        - name: RBX_PRODUCT_KEY
                          value: strategos
                        - name: RBX_AUTHZ_GATEWAY_URL
                          value: http://rbx-policy-gateway.rbx-identity.svc.cluster.local:8083
                      readinessProbe:
                        httpGet:
                          path: /healthz
                          port: 8081
                        initialDelaySeconds: 5
                        periodSeconds: 5
                        timeoutSeconds: 3
                        failureThreshold: 3
                      livenessProbe:
                        httpGet:
                          path: /healthz
                          port: 8081
                        initialDelaySeconds: 15
                        periodSeconds: 10
                        timeoutSeconds: 3
                        failureThreshold: 3
                      resources:
                        requests:
                          cpu: 50m
                          memory: 128Mi
                        limits:
                          cpu: 500m
                          memory: 512Mi
                      securityContext:
                        allowPrivilegeEscalation: false
                        runAsNonRoot: true
                        runAsUser: 1001
                        capabilities:
                          drop:
                            - ALL

          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: rbx-policy-gateway
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-policy-gateway
                app.kubernetes.io/component: policy-gateway
                app.kubernetes.io/part-of: rbx-identity
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app.kubernetes.io/name: rbx-policy-gateway
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: rbx-policy-gateway
                    app.kubernetes.io/component: policy-gateway
                    app.kubernetes.io/part-of: rbx-identity
                spec:
                  imagePullSecrets:
                    - name: ghcr-pull-secret
                  containers:
                    - name: rbx-policy-gateway
                      image: ghcr.io/rbxrobotica/rbx-policy-gateway:sha-a0dd671
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 8083
                          name: http
                      env:
                        - name: RBX_POLICY_GATEWAY_BIND_ADDR
                          value: 0.0.0.0:8083
                      readinessProbe:
                        httpGet:
                          path: /healthz
                          port: 8083
                        initialDelaySeconds: 5
                        periodSeconds: 5
                        timeoutSeconds: 3
                        failureThreshold: 3
                      livenessProbe:
                        httpGet:
                          path: /healthz
                          port: 8083
                        initialDelaySeconds: 15
                        periodSeconds: 10
                        timeoutSeconds: 3
                        failureThreshold: 3
                      resources:
                        requests:
                          cpu: 25m
                          memory: 64Mi
                        limits:
                          cpu: 250m
                          memory: 256Mi
                      securityContext:
                        allowPrivilegeEscalation: false
                        runAsNonRoot: true
                        runAsUser: 1001
                        capabilities:
                          drop:
                            - ALL

          - apiVersion: v1
            kind: Service
            metadata:
              name: rbx-policy-gateway
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-policy-gateway
                app.kubernetes.io/component: policy-gateway
                app.kubernetes.io/part-of: rbx-identity
            spec:
              type: ClusterIP
              selector:
                app.kubernetes.io/name: rbx-policy-gateway
              ports:
                - name: http
                  port: 8083
                  targetPort: 8083

          - apiVersion: v1
            kind: Service
            metadata:
              name: rbx-session-bff
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-session-bff
                app.kubernetes.io/component: session-bff
                app.kubernetes.io/part-of: rbx-identity
            spec:
              type: ClusterIP
              selector:
                app.kubernetes.io/name: rbx-session-bff
              ports:
                - name: http
                  port: 8081
                  targetPort: 8081

          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: rbx-session-bff
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-session-bff
                app.kubernetes.io/component: session-bff
                app.kubernetes.io/part-of: rbx-identity
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
            spec:
              ingressClassName: traefik
              tls:
                - secretName: zitadel-tls
                  hosts:
                  - auth.merovelis.com
              rules:
                - host: auth.merovelis.com
                  http:
                    paths:
                      - path: /oidc
                        pathType: Prefix
                        backend:
                          service:
                            name: rbx-session-bff
                            port:
                              number: 8081
                      - path: /me
                        pathType: Prefix
                        backend:
                          service:
                            name: rbx-session-bff
                            port:
                              number: 8081

  destination:
    server: https://kubernetes.default.svc
    namespace: rbx-identity

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
