# ArgoCD Application: RBX Identity
# Canonical identity provider for RBX production auth.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbx-identity
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-identity
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: rbx-identity
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://charts.zitadel.com
    chart: zitadel
    targetRevision: 9.34.0
    helm:
      releaseName: rbx-identity
      values: |
        replicaCount: 2

        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: auth.rbx.ia.br
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: zitadel-tls
              hosts:
                - auth.rbx.ia.br

        login:
          ingress:
            enabled: true
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - host: auth.rbx.ia.br
                paths:
                  - path: /ui/v2/login
                    pathType: Prefix
            tls:
              - secretName: zitadel-tls
                hosts:
                  - auth.rbx.ia.br

        zitadel:
          masterkeySecretName: zitadel-masterkey
          configmapConfig:
            ExternalDomain: auth.rbx.ia.br
            ExternalPort: 443
            ExternalSecure: true
            TLS:
              Enabled: false
            Database:
              Postgres:
                Host: 161.97.147.76
                Port: 5432
                Database: zitadel
                MaxOpenConns: 20
                MaxIdleConns: 10
                MaxConnLifetime: 30m
                MaxConnIdleTime: 5m
                User:
                  Username: zitadel
                  SSL:
                    Mode: require
                Admin:
                  Username: zitadel_admin
                  SSL:
                    Mode: require
          configSecretName: zitadel-config
          initJob:
            enabled: true
            command: "zitadel"

        extraManifests:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: rbx-session-bff
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-session-bff
                app.kubernetes.io/component: session-bff
                app.kubernetes.io/part-of: rbx-identity
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app.kubernetes.io/name: rbx-session-bff
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: rbx-session-bff
                    app.kubernetes.io/component: session-bff
                    app.kubernetes.io/part-of: rbx-identity
                spec:
                  imagePullSecrets:
                    - name: ghcr-pull-secret
                  containers:
                    - name: rbx-session-bff
                      image: ghcr.io/ldamasio/rbx-session-bff:sha-b4eb88b
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 8081
                          name: http
                      env:
                        - name: RBX_IDENTITY_ISSUER
                          value: https://auth.rbx.ia.br
                        - name: RBX_SESSION_BFF_DISCOVER_OIDC
                          value: "true"
                        - name: RBX_SESSION_BFF_CLIENT_ID
                          value: strategos-session-bff
                        - name: RBX_SESSION_BFF_REDIRECT_URI
                          value: https://strategos.rbx.ia.br/api/auth/callback
                        - name: RBX_SESSION_BFF_BIND_ADDR
                          value: 0.0.0.0:8081
                      readinessProbe:
                        httpGet:
                          path: /healthz
                          port: 8081
                        initialDelaySeconds: 5
                        periodSeconds: 5
                        timeoutSeconds: 3
                        failureThreshold: 3
                      livenessProbe:
                        httpGet:
                          path: /healthz
                          port: 8081
                        initialDelaySeconds: 15
                        periodSeconds: 10
                        timeoutSeconds: 3
                        failureThreshold: 3
                      resources:
                        requests:
                          cpu: 50m
                          memory: 128Mi
                        limits:
                          cpu: 500m
                          memory: 512Mi
                      securityContext:
                        allowPrivilegeEscalation: false
                        runAsNonRoot: true
                        runAsUser: 1001
                        capabilities:
                          drop:
                            - ALL

          - apiVersion: v1
            kind: Service
            metadata:
              name: rbx-session-bff
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-session-bff
                app.kubernetes.io/component: session-bff
                app.kubernetes.io/part-of: rbx-identity
            spec:
              type: ClusterIP
              selector:
                app.kubernetes.io/name: rbx-session-bff
              ports:
                - name: http
                  port: 8081
                  targetPort: 8081

          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: rbx-session-bff
              namespace: rbx-identity
              labels:
                app.kubernetes.io/name: rbx-session-bff
                app.kubernetes.io/component: session-bff
                app.kubernetes.io/part-of: rbx-identity
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
            spec:
              ingressClassName: traefik
              tls:
                - secretName: zitadel-tls
                  hosts:
                    - auth.rbx.ia.br
              rules:
                - host: auth.rbx.ia.br
                  http:
                    paths:
                      - path: /oidc
                        pathType: Prefix
                        backend:
                          service:
                            name: rbx-session-bff
                            port:
                              number: 8081
                      - path: /me
                        pathType: Prefix
                        backend:
                          service:
                            name: rbx-session-bff
                            port:
                              number: 8081

  destination:
    server: https://kubernetes.default.svc
    namespace: rbx-identity

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
