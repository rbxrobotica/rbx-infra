# ArgoCD Application: rbx-payments (BTCPay Server — ADR-0009 Layer 2)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbx-payments
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-payments
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: rbx-payments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/rbx-payments

  destination:
    server: https://kubernetes.default.svc
    namespace: rbx-payments

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
