apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbx-observability
  namespace: argocd
  labels:
    app.kubernetes.io/name: rbx-observability
    app.kubernetes.io/part-of: rbx-observability
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/rbxrobotica/rbx-observability
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^sha-[0-9a-f]+$
    argocd-image-updater.argoproj.io/app.kustomize.image-name: ghcr.io/rbxrobotica/rbx-observability
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: kustomization
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rbx-applications
  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    path: apps/prod/rbx-observability
  destination:
    server: https://kubernetes.default.svc
    namespace: rbx-observability
  # Manual sync until the container image is built+pushed and secrets exist in rbx-ia-br.
