# ArgoCD Application: Robson v2 Production
#
# ARCHIVED (MIG-v3#2, 2026-04-11):
# robsond moved to namespace robson. robson-prod now manages the entire stack.
# This Application manifest is kept to allow ArgoCD to prune robson-v2 resources.
#
# MANUAL STEP: After robson-v2 namespace is fully drained, delete this
# Application from ArgoCD:
#   kubectl delete application robson-v2-prod -n argocd
# Then delete this file from git.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robson-v2-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: robson-v2-prod
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: robson
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Prevent ArgoCD from trying to sync the archived path
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: rbx-applications

  source:
    repoURL: https://github.com/rbxrobotica/rbx-infra
    targetRevision: main
    # Points to archived directory — ArgoCD will show "path not found"
    # This is intentional. Delete the Application once namespace is drained.
    path: apps/archived/robson-v2

  destination:
    server: https://kubernetes.default.svc
    namespace: robson-v2

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
