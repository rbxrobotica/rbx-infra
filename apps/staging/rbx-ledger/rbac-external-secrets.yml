# ServiceAccount + RBAC so External Secrets reads rbx-ledger-secrets from rbx-ia-br
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-reader
  namespace: rbx-ledger
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-ledger-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rbx-ledger-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-ledger
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-ledger
roleRef:
  kind: Role
  name: read-ledger-secret
  apiGroup: rbac.authorization.k8s.io
