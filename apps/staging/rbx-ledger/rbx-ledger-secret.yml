# ExternalSecret syncs rbx-ledger-secrets from rbx-ia-br namespace.
# Seed the source Secret out of band (pass is the source of truth):
#   kubectl -n rbx-ia-br create secret generic rbx-ledger-secrets \
#     --from-literal=DATABASE_URL=<external-postgres-dsn>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-ledger-secrets
  namespace: rbx-ledger
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-ledger-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: rbx-ledger-secrets
        property: DATABASE_URL
