# Backend: Rust/Axum. ClusterIP only, never exposed (no auth). Runs migrations.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-ledger-backend
  namespace: rbx-ledger
  labels:
    app.kubernetes.io/name: rbx-ledger-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: rbx-ledger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-ledger-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-ledger-backend
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: backend
          image: ghcr.io/rbxrobotica/rbx-ledger-backend:sha-e7980b9
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: RBX_LEDGER_BIND_ADDR
              value: 0.0.0.0:8080
            - name: RBX_LEDGER_RUN_MIGRATIONS
              value: "true"
            - name: RUST_LOG
              value: rbx_ledger=info,tower_http=info
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-ledger-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
