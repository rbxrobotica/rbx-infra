apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-store
  namespace: rbx-ledger
spec:
  provider:
    kubernetes:
      auth:
        serviceAccount:
          name: external-secrets-reader
      remoteNamespace: rbx-ia-br
      server:
        caProvider:
          key: ca.crt
          name: kube-root-ca.crt
          type: ConfigMap
        url: https://kubernetes.default.svc.cluster.local
