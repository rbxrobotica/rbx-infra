# Robsond Deployment (Testnet)
#
# Uses same image as production. Environment difference is ConfigMap + Secret.
# SHA tag must be pinned explicitly — update before deploying.
# Never use :latest or any mutable tag.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robsond
  namespace: robson-testnet
  labels:
    app.kubernetes.io/name: robsond
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: robson
    environment: testnet
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: robsond
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robsond
        app.kubernetes.io/component: daemon
        app.kubernetes.io/part-of: robson
        environment: testnet
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: robsond
      imagePullSecrets:
      - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: robsond
        # Pin to explicit SHA. Replace sha-REPLACE_ME with the actual tag from GHCR.
        image: ghcr.io/rbxrobotica/robson-v2:sha-a9b90f97
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        envFrom:
        - configMapRef:
            name: robsond-config

        env:
        # Database (from testnet secret)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: robsond-testnet-secret
              key: database-url
        - name: PROJECTION_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: robsond-testnet-secret
              key: projection-tenant-id
        # Binance testnet credentials
        - name: ROBSON_BINANCE_API_KEY
          valueFrom:
            secretKeyRef:
              name: robsond-testnet-secret
              key: binance-api-key
        - name: ROBSON_BINANCE_API_SECRET
          valueFrom:
            secretKeyRef:
              name: robsond-testnet-secret
              key: binance-api-secret
        # API bearer token (from secret)
        - name: ROBSON_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: robsond-testnet-secret
              key: api-token

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
