# ExternalSecret syncs rbx-llm-secrets from the rbx-ia-br namespace.
# Holds the LiteLLM gateway virtual key used by the AI chat endpoint.
# Mirrors the rbx-contact-secrets replication pattern.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-llm-secrets
  namespace: rbxsystems-ch
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-llm-secrets
    creationPolicy: Owner
  data:
    - secretKey: LLM_GATEWAY_KEY
      remoteRef:
        key: rbx-llm-secrets
        property: LLM_GATEWAY_KEY
