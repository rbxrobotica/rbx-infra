# Deployment: rbxsystems.ch (site internacional RBX Systems)
# NOTE: Requires contabo-s3-credentials secret (shared with rbx-ia-br).
# Sync secret to this namespace via ExternalSecret Operator or manual kubectl create secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbxsystems-ch
  namespace: rbxsystems-ch
  labels:
    app.kubernetes.io/name: rbxsystems-ch
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: rbxsystems-ch
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbxsystems-ch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbxsystems-ch
        app.kubernetes.io/component: frontend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - analytics
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rbxsystems-ch
                topologyKey: kubernetes.io/hostname
      containers:
        - name: rbx-frontend
          image: ghcr.io/rbxrobotica/rbx-ia-br:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CONTABO_S3_ENDPOINT
              value: "https://eu2.contabostorage.com"
            - name: CONTABO_S3_CONTENT_BUCKET
              value: "rbx-content"
            - name: CONTABO_S3_PUBLIC_URL
              value: "https://eu2.contabostorage.com/rbx-content"
            - name: CONTABO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: CONTABO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
            # SSR runtime (adapter-node) — ADR-0002 Sovereign Content Delivery Layer.
            # PORT must match the container/svc port; ORIGIN + forwarded headers let
            # adapter-node trust the Traefik ingress; cache TTL bounds publish→live.
            - name: PORT
              value: "8080"
            - name: ORIGIN
              value: "https://rbxsystems.ch"
            - name: PROTOCOL_HEADER
              value: "x-forwarded-proto"
            - name: HOST_HEADER
              value: "x-forwarded-host"
            - name: CONTENT_CACHE_TTL_SECONDS
              value: "60"
            - name: CONTENT_CACHE_STALE_SECONDS
              value: "300"
            # AI chat — routes through the LiteLLM gateway (Thalamus-governed).
            # The site holds only a virtual key; provider keys live in the gateway.
            # rbx-llm-secrets is replicated from rbx-ia-br via externalsecret-llm.yml.
            - name: LLM_GATEWAY_URL
              value: "http://litellm.llm-gateway.svc.cluster.local:4000/v1"
            - name: LLM_MODEL
              value: "groq-prod"
            - name: LLM_GATEWAY_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-llm-secrets
                  key: LLM_GATEWAY_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
              cpu: 1000m
