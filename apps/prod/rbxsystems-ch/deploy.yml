# Deployment: rbxsystems.ch (site internacional RBX Systems)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbxsystems-ch
  namespace: rbxsystems-ch
  labels:
    app.kubernetes.io/name: rbxsystems-ch
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: rbxsystems-ch
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbxsystems-ch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbxsystems-ch
        app.kubernetes.io/component: frontend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - analytics
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rbxsystems-ch
                topologyKey: kubernetes.io/hostname
      containers:
        - name: rbx-frontend
          image: docker.io/ldamasio/rbx-ia-br-prod:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
