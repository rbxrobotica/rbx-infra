# ExternalSecret syncs contabo-s3-credentials from rbx-ia-br namespace
# This ensures automatic secret replication and forces pod restarts when secret updates
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: contabo-s3-credentials
  namespace: rbxsystems-ch
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: contabo-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_SECRET_ACCESS_KEY
