# Robson Frontend v2 Deployment (SvelteKit)
# Image: ghcr.io/ldamasio/robson-frontend-v2
# Deviation from rbx-infra standard ghcr.io/rbxrobotica/* documented in kustomization.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robson-frontend-v2
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-frontend-v2
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: robson
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-frontend-v2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-frontend-v2
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: nginx
        image: ghcr.io/ldamasio/robson-frontend-v2:sha-236a0c2
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /run
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
