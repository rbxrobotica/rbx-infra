# Robson Frontend Deployment (Production)
# Image: ldamasio/rbs-frontend-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robson-frontend
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: robson
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: frontend
        image: ldamasio/rbs-frontend-prod:sha-b593285
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "250m"
            memory: "100Mi"
          limits:
            cpu: "500m"
            memory: "200Mi"
