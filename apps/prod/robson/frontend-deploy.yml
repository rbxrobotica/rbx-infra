# Robson Frontend Deployment (Production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robson-frontend
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: robson
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-frontend
        app.kubernetes.io/component: frontend
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: frontend
          image: ldamasio/robson-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: robson-frontend
                topologyKey: kubernetes.io/hostname
