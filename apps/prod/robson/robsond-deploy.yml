# Robsond Deployment (Production)
#
# Single replica, Recreate strategy.
# robsond is the sole production runtime.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robsond
  namespace: robson
  labels:
    app.kubernetes.io/name: robsond
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: robson
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: robsond
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robsond
        app.kubernetes.io/component: daemon
        app.kubernetes.io/part-of: robson
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: robsond
      imagePullSecrets:
      - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: robsond
        image: ghcr.io/rbxrobotica/robson-v2:sha-df785ff3
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        envFrom:
        - configMapRef:
            name: robsond-config

        env:
        # Database (from secret)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: robsond-secret
              key: database-url
        - name: PROJECTION_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: robsond-secret
              key: projection-tenant-id
        # Binance production credentials
        - name: ROBSON_BINANCE_API_KEY
          valueFrom:
            secretKeyRef:
              name: robsond-secret
              key: binance-api-key
        - name: ROBSON_BINANCE_API_SECRET
          valueFrom:
            secretKeyRef:
              name: robsond-secret
              key: binance-api-secret
        # API bearer token (from secret)
        - name: ROBSON_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: robsond-secret
              key: api-token

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        # Liveness: is the process alive?
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        # Readiness: is the service ready?
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        # Startup: allow extra time on first boot
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
