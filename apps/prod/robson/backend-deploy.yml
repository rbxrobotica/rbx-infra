# Robson Backend Deployment (Production)
# Image: ldamasio/rbs-backend-monolith-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robson-backend
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: robson
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
      - name: backend
        image: ldamasio/rbs-backend-monolith-prod:sha-baca0fc
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "backend.settings"
        - name: DEBUG
          value: "False"
        - name: RBS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: RBS_SECRET_KEY
        - name: RBS_BINANCE_API_KEY_TEST
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: RBS_BINANCE_API_KEY_TEST
        - name: RBS_BINANCE_SECRET_KEY_TEST
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: RBS_BINANCE_SECRET_KEY_TEST
        - name: RBS_BINANCE_API_KEY_PROD
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: RBS_BINANCE_API_KEY_PROD
        - name: RBS_BINANCE_SECRET_KEY_PROD
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: RBS_BINANCE_SECRET_KEY_PROD
        - name: RBS_BINANCE_API_URL_TEST
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: RBS_BINANCE_API_URL_TEST
        - name: RBS_PG_DATABASE
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_DATABASE
        - name: RBS_PG_USER
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_USER
        - name: RBS_PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_PASSWORD
        - name: RBS_PG_HOST
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_HOST
        - name: RBS_PG_PORT
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_PORT
        - name: REDIS_URL
          value: "redis://robson-redis:6379/1"
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: rbx-groq-secret
              key: GROQ_API_KEY
        - name: BINANCE_USE_TESTNET
          value: "False"
        - name: TRADING_ENABLED
          value: "True"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "750m"
            memory: "1000Mi"
          limits:
            cpu: "1500m"
            memory: "1000Mi"
