# Robson Backend Deployment (Production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robson-backend
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: robson
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: django
          image: ldamasio/robson-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "monolith.settings.production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: robson-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://robson-redis:6379/0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: nginx
          image: ldamasio/robson-nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: robson-backend
                topologyKey: kubernetes.io/hostname
