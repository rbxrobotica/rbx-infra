# Kustomization for Robson Production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace
  - namespace.yml
  # Middleware
  - middleware-https.yml
  # Frontend (React)
  - frontend-deploy.yml
  - frontend-svc.yml
  # Robsond (Rust daemon — sole production runtime, MIG-v3#2)
  - robsond-rbac.yml
  - robsond-config.yml
  - robsond-deploy.yml
  - robsond-svc.yml
  - robsond-db-migrate-job.yml
  # Infrastructure
  - redis-deploy.yml
  - redis-svc.yml
  - paradedb-svc.yml
  # Routing (Gateway API only — ADR-v3-018)
  - httproutes.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: robson
      environment: production
    includeSelectors: false
