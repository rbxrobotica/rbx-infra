# Kustomization for Robson Production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace
  - namespace.yml
  # Middleware
  - middleware-https.yml
  # Frontend v2 (SvelteKit) replaces legacy React frontend.
  # Legacy files archived under apps/archived/robson-frontend-react/.
  # Network model: Ingress (traefik) — Gateway API HTTPRoute migration
  # deferred to FE-P3 follow-up; ADR-v3-018 deviation acknowledged.
  # Image: ghcr.io/ldamasio/robson-frontend-v2 (deviation from rbx-infra
  # standard ghcr.io/rbxrobotica/* — image exists and is public).
  - robson-frontend-v2-deploy.yml
  - robson-frontend-v2-svc.yml
  - robson-frontend-v2-ingress.yml
  # Robsond (Rust daemon — sole production runtime, MIG-v3#2)
  - robsond-rbac.yml
  - robsond-config.yml
  - robsond-db-migrate-job.yml
  - robsond-deploy.yml
  - robsond-svc.yml
  - robsond-ingress.yml
  # Infrastructure
  - redis-deploy.yml
  - redis-svc.yml
  - paradedb-svc.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: robson
      environment: production
    includeSelectors: false
