# Kustomization for Robson Production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace
  - namespace.yml
  # Robson trading app
  - middleware-https.yml
  - frontend-deploy.yml
  - frontend-svc.yml
  - frontend-ingress.yml
  - backend-deploy.yml
  - backend-svc.yml
  - backend-ingress.yml
  - redis-deploy.yml
  - redis-svc.yml
  - paradedb-svc.yml
  - cronjobs.yml

commonLabels:
  app.kubernetes.io/part-of: robson
  environment: production

patches:
  # paradedb-svc is an external service (Endpoints point to jaguar node).
  # commonLabels would add a spec.selector, causing kube to auto-manage
  # Endpoints and ignore the manual ones. This patch removes that selector.
  - patch: |-
      - op: remove
        path: /spec/selector
    target:
      kind: Service
      name: robson-paradedb

