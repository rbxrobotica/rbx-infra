# Robson Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robson-redis
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: robson
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 2
            periodSeconds: 5
