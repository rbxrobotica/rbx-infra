# Robson ParadeDB StatefulSet (PostgreSQL with search extensions)
# Credentials from rbs-django-secret (shared with backend)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: robson-paradedb
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-paradedb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: robson
spec:
  serviceName: robson-paradedb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-paradedb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-paradedb
        app.kubernetes.io/component: database
    spec:
      containers:
      - name: paradedb
        image: paradedb/paradedb:latest
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: rbs-django-secret
              key: POSTGRES_DATABASE
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - robson
            - -d
            - rbsdb
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - robson
            - -d
            - rbsdb
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 10Gi
