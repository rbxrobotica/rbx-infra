# Robson ParadeDB StatefulSet (PostgreSQL with search)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: robson-paradedb
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-paradedb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: robson
spec:
  serviceName: robson-paradedb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: robson-paradedb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robson-paradedb
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: paradedb
          image: paradedb/paradedb:latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: robson-secrets
                  key: database-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: robson-secrets
                  key: database-password
            - name: POSTGRES_DB
              value: robson
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
