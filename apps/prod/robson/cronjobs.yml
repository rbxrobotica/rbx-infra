# Pattern Scan CronJob — every 15 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rbs-pattern-scan-cronjob
  namespace: robson
  labels:
    app.kubernetes.io/name: rbs-pattern-scan-cronjob
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/part-of: robson
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: pattern-scan
              image: ldamasio/rbs-backend-monolith-prod:sha-49df419
