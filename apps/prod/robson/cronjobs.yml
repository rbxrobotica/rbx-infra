# Robson CronJobs (Production)
# Scheduled tasks for trading operations

---
# Stop Monitor CronJob — every minute
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rbs-stop-monitor-cronjob
  namespace: robson
  labels:
    app.kubernetes.io/name: rbs-stop-monitor-cronjob
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/part-of: robson
spec:
  schedule: "* * * * *"
  suspend: true  # MIG-v3#1 2026-04-10: robsond assumes execution path
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: stop-monitor
              image: ldamasio/rbs-backend-monolith-prod:sha-49df419
              imagePullPolicy: Always
              command:
                - python
                - manage.py
                - monitor_stops
              env:
                - name: DJANGO_SETTINGS_MODULE
                  value: "backend.settings"
                - name: DEBUG
                  value: "False"
                - name: RBS_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: RBS_SECRET_KEY
                - name: RBS_BINANCE_API_KEY_TEST
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: RBS_BINANCE_API_KEY_TEST
                - name: RBS_BINANCE_SECRET_KEY_TEST
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: RBS_BINANCE_SECRET_KEY_TEST
                - name: RBS_BINANCE_API_KEY_PROD
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: RBS_BINANCE_API_KEY_PROD
                - name: RBS_BINANCE_SECRET_KEY_PROD
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: RBS_BINANCE_SECRET_KEY_PROD
                - name: RBS_BINANCE_API_URL_TEST
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: RBS_BINANCE_API_URL_TEST
                - name: RBS_PG_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: POSTGRES_DATABASE
                - name: RBS_PG_USER
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: POSTGRES_USER
                - name: RBS_PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: POSTGRES_PASSWORD
                - name: RBS_PG_HOST
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: POSTGRES_HOST
                - name: RBS_PG_PORT
                  valueFrom:
                    secretKeyRef:
                      name: rbs-django-secret
                      key: POSTGRES_PORT
                - name: REDIS_URL
                  value: "redis://robson-redis:6379/1"
                - name: BINANCE_USE_TESTNET
                  value: "False"
                - name: TRADING_ENABLED
                  value: "True"
          restartPolicy: OnFailure

