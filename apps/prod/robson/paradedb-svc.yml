# Robson ParadeDB Service
apiVersion: v1
kind: Service
metadata:
  name: robson-paradedb
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-paradedb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: robson
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: robson-paradedb
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres

---
# paradedb alias service — POSTGRES_HOST=paradedb.robson.svc.cluster.local in rbs-django-secret
apiVersion: v1
kind: Service
metadata:
  name: paradedb
  namespace: robson
  labels:
    app.kubernetes.io/name: robson-paradedb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: robson
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: robson-paradedb
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
