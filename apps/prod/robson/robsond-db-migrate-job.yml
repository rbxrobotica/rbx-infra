# robsond DB migration Job
#
# Managed by ArgoCD as a Sync hook. It runs before the robsond Deployment wave
# on every sync and is safe to re-run because `robsond db migrate` is
# idempotent.
#
# Runs at deploy time to:
#   1. Apply all SQLx migrations (robsond db migrate)
#   2. Seed the tenant/account rows (robsond db init --tenant-id $PROJECTION_TENANT_ID)
#
# Prerequisites (run BEFORE first ArgoCD sync):
#   1. Create the robson database via Ansible (paradedb role)
#   2. Generate PROJECTION_TENANT_ID: uuidgen
#   3. Create the secret:
#        kubectl create secret generic robsond-secret -n robson \
#          --from-literal=database-url="postgresql://robson:<pass>@paradedb:5432/robson" \
#          --from-literal=projection-tenant-id="<uuid>"
#
# If this Job fails, ArgoCD blocks the higher sync wave and the robsond
# Deployment is not updated to an image that may require unapplied schema.
apiVersion: batch/v1
kind: Job
metadata:
  name: robsond-db-migrate
  namespace: robson
  labels:
    app.kubernetes.io/name: robsond
    app.kubernetes.io/component: db-migrate
    app.kubernetes.io/part-of: robson
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robsond
        app.kubernetes.io/component: db-migrate
    spec:
      serviceAccountName: robsond
      imagePullSecrets:
      - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      restartPolicy: OnFailure

      containers:
      - name: db-migrate
        image: ghcr.io/rbxrobotica/robson-v2:sha-6687201b
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          set -e
          echo "=== Running robsond db migrate ==="
          robsond db migrate
          echo "=== Running robsond db init ==="
          robsond db init --tenant-id "${PROJECTION_TENANT_ID}"
          echo "=== Bootstrap complete ==="

        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: robsond-secret
              key: database-url
        - name: PROJECTION_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: robsond-secret
              key: projection-tenant-id

        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
