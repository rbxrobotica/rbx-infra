# ExternalSecret for rbx-market-briefing.
# Assembles the sensitive runtime credentials the CronJob consumes via envFrom.
#
# Only true secrets are pulled here; non-sensitive configuration (S3 endpoint/
# bucket/prefix, LLM base URL/model) is supplied as plain env in cronjob.yml,
# matching the repo convention (see apps/prod/eden/api-deploy.yml).
#
# Remote secrets (in namespace rbx-ia-br), provisioned by the operator via the
# Ansible k8s-secrets role (reads from pass) — never committed to git:
#   contabo-s3-credentials  → AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (already exists)
#   rbx-market-briefing-llm → LLM_API_KEY (operator must create — see SLICE-007 session log)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-market-briefing-secrets
  namespace: rbx-market-briefing
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-market-briefing-secrets
    creationPolicy: Owner
  data:
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_ACCESS_KEY_ID
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: LLM_API_KEY
      remoteRef:
        key: rbx-market-briefing-llm
        property: LLM_API_KEY
