# CronJob: rbx-market-briefing daily BTCUSDT flight plan.
# Schedule: 05:00 UTC Mon-Fri (≈02:00 BRT + margin) — markets are 24/7 but the
# briefing targets the operator's working week.
# A single container runs the full pipeline (run) and then publishes to S3
# (publish) sequentially; both commands share the same working dir and the
# emptyDir-backed ./out, so no inter-container volume handoff is needed.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rbx-market-briefing
  namespace: rbx-market-briefing
  labels:
    app.kubernetes.io/name: rbx-market-briefing
    app.kubernetes.io/part-of: rbx-market-briefing
    environment: production
spec:
  schedule: "0 5 * * 1-5"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-market-briefing
        app.kubernetes.io/part-of: rbx-market-briefing
        environment: production
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rbx-market-briefing
            app.kubernetes.io/part-of: rbx-market-briefing
            environment: production
        spec:
          restartPolicy: OnFailure
          serviceAccountName: rbx-market-briefing
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: ghcr-pull-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: briefing
              image: ghcr.io/rbxrobotica/rbx-market-briefing:latest
              imagePullPolicy: Always
              workingDir: /app
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  BRIEFING_DATE="$(date -u +%Y-%m-%d)"
                  echo "[rbx-market-briefing] generating briefing for ${BRIEFING_DATE}"
                  bun src/index.ts run --date "${BRIEFING_DATE}" --mode daily --llm
                  echo "[rbx-market-briefing] publishing briefing for ${BRIEFING_DATE}"
                  bun src/index.ts publish --date "${BRIEFING_DATE}"
                  echo "[rbx-market-briefing] done for ${BRIEFING_DATE}"
              envFrom:
                - secretRef:
                    name: rbx-market-briefing-secrets
              env:
                - name: HOME
                  value: "/tmp"
                - name: LLM_BASE_URL
                  value: "http://litellm.llm-gateway.svc.cluster.local:4000"
                # groq-test → groq/llama-3.3-70b-versatile (deliberate prod model).
                - name: LLM_MODEL
                  value: "groq-test"
                - name: S3_ENDPOINT
                  value: "https://eu2.contabostorage.com"
                - name: S3_BUCKET
                  value: "rbx-content"
                - name: S3_PREFIX
                  value: "robson/market-briefings"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              volumeMounts:
                - name: config
                  mountPath: /app/config
                  readOnly: true
                - name: out
                  mountPath: /app/out
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config
              configMap:
                name: rbx-market-briefing-config
            - name: out
              emptyDir: {}
            - name: tmp
              emptyDir: {}
