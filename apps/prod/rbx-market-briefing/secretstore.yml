# SecretStore for rbx-market-briefing.
# Reads secrets from the central rbx-ia-br namespace via the kubernetes provider,
# following the same pattern as apps/prod/eden/secretstore.yml.
# The remote RBAC granting this ServiceAccount read access lives in rbac.yml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-reader
  namespace: rbx-market-briefing

---

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-store
  namespace: rbx-market-briefing
spec:
  provider:
    kubernetes:
      auth:
        serviceAccount:
          name: external-secrets-reader
      remoteNamespace: rbx-ia-br
      server:
        caProvider:
          key: ca.crt
          name: kube-root-ca.crt
          type: ConfigMap
        url: https://kubernetes.default.svc.cluster.local
