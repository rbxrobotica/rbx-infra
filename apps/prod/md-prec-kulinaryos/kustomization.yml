# Kustomization for md-prec-kulinaryos Production
# RBX MPBIC — Modelo de Precificação Baseado em Índice de Complexidade (v1.0)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - middleware-https.yml
  - md-prec-kulinaryos-deploy.yml
  - md-prec-kulinaryos-svc.yml
  - md-prec-kulinaryos-ingress.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: md-prec-kulinaryos
      environment: production
    includeSelectors: false

images:
  # Tag promoted by ArgoCD Image Updater (git write-back to this file).
  # See gitops/app-of-apps/md-prec-kulinaryos-prod.yml and docs/infra/IMAGE-PROMOTION.md.
  - name: ghcr.io/rbxrobotica/md-prec-kulinaryos
    newTag: sha-9dfb375
