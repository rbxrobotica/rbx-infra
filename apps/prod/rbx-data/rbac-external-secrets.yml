# RBAC for rbx-data's external-secrets-reader SA to read its source secrets
# from rbx-ia-br. The SA itself is defined in secretstore.yml (this file only
# grants it least-privilege read on the specific secrets rbx-data consumes).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-rbx-data-secrets
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - rbx-data-token
      - rbx-data-warehouse
      - contabo-s3-credentials
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-data
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-data
roleRef:
  kind: Role
  name: read-rbx-data-secrets
  apiGroup: rbac.authorization.k8s.io
