apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-data-warehouse
  namespace: rbx-data
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-data-warehouse
    creationPolicy: Owner
  data:
    - secretKey: dsn
      remoteRef:
        key: rbx-data-warehouse
        property: dsn
