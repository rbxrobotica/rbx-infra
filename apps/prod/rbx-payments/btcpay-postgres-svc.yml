# Headless Service + Endpoints pointing at the external Postgres host (jaguar).
# See docs/infra/DATABASE.md — no application runs its own DB inside k3s.
apiVersion: v1
kind: Service
metadata:
  name: rbx-btcpay-postgres
  namespace: rbx-payments
spec:
  ports:
    - port: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: rbx-btcpay-postgres
  namespace: rbx-payments
subsets:
  - addresses:
      - ip: 161.97.147.76
    ports:
      - port: 5432
