# Bitcoin Core (pruned, mainnet) — ADR-0009 Layer 2 (BTCPay Server, BTC on-chain only for now).
# Pinned to altaica: jaguar is tainted robson.io/dedicated=analytics and hosts the
# shared external Postgres (161.97.147.76) — keep this node's heavy sync I/O off it.
apiVersion: v1
kind: Service
metadata:
  name: rbx-btcpay-bitcoind
  namespace: rbx-payments
  labels:
    app.kubernetes.io/name: rbx-btcpay-bitcoind
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: rbx-btcpay-bitcoind
  ports:
    - name: rpc
      port: 8332
      targetPort: 8332
    - name: p2p
      port: 8333
      targetPort: 8333
    - name: zmq-block
      port: 28332
      targetPort: 28332
    - name: zmq-tx
      port: 28333
      targetPort: 28333
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rbx-btcpay-bitcoind
  namespace: rbx-payments
  labels:
    app.kubernetes.io/name: rbx-btcpay-bitcoind
spec:
  serviceName: rbx-btcpay-bitcoind
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-btcpay-bitcoind
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-btcpay-bitcoind
    spec:
      nodeSelector:
        kubernetes.io/hostname: altaica
      securityContext:
        fsGroup: 1000
      containers:
        - name: bitcoind
          image: btcpayserver/bitcoin:27.1
          command: ["bitcoind"]
          args:
            - -printtoconsole
            - -chain=main
            - -datadir=/data
            - -server=1
            - -rpcbind=0.0.0.0
            - -rpcallowip=0.0.0.0/0
            - -rpcport=8332
            - -rpcuser=$(BITCOIND_RPC_USER)
            - -rpcpassword=$(BITCOIND_RPC_PASSWORD)
            - -prune=50000
            - -dbcache=300
            - -maxconnections=40
            - -zmqpubrawblock=tcp://0.0.0.0:28332
            - -zmqpubrawtx=tcp://0.0.0.0:28333
          env:
            - name: BITCOIND_RPC_USER
              valueFrom:
                secretKeyRef:
                  name: rbx-btcpay-secrets
                  key: BITCOIND_RPC_USER
            - name: BITCOIND_RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rbx-btcpay-secrets
                  key: BITCOIND_RPC_PASSWORD
          ports:
            - containerPort: 8332
              name: rpc
            - containerPort: 8333
              name: p2p
            - containerPort: 28332
              name: zmq-block
            - containerPort: 28333
              name: zmq-tx
          volumeMounts:
            - name: bitcoind-data
              mountPath: /data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          readinessProbe:
            exec:
              command:
                - bitcoin-cli
                - -datadir=/data
                - -rpcuser=$(BITCOIND_RPC_USER)
                - -rpcpassword=$(BITCOIND_RPC_PASSWORD)
                - getblockchaininfo
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: bitcoind-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 60Gi
