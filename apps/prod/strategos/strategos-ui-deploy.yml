# Strategos UI Deployment
# Image is published by ldamasio/strategos-ui GitHub Actions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategos-ui
  namespace: strategos
  labels:
    app.kubernetes.io/name: strategos-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: strategos
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: strategos-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strategos-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: strategos-ui
          image: ghcr.io/ldamasio/strategos-ui:sha-68ea2c0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
