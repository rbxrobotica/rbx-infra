# Strategos Site Deployment (product landing page for strategos.gr)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategos-site
  namespace: strategos
  labels:
    app.kubernetes.io/name: strategos-site
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: strategos
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: strategos-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strategos-site
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: strategos-site
          # Image name only — tag injected by kustomization.yml (images-transformer),
          # promoted by ArgoCD Image Updater. See gitops/app-of-apps/strategos-prod.yml.
          image: ghcr.io/rbxrobotica/strategos-site
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
