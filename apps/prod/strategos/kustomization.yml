# Kustomization for Strategos Production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - middleware-https.yml
  - strategos-ui-deploy.yml
  - strategos-ui-svc.yml
  - strategos-ui-ingress.yml
  - strategos-site-deploy.yml
  - strategos-site-svc.yml
  - strategos-site-ingress.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: strategos
      environment: production
    includeSelectors: false

images:
  # Tags promoted by ArgoCD Image Updater (git write-back to this file).
  # See gitops/app-of-apps/strategos-prod.yml and docs/infra/IMAGE-PROMOTION.md.
  - name: ghcr.io/rbxrobotica/strategos-site
    newTag: sha-f26387e
  - name: ghcr.io/rbxrobotica/strategos-ui
    newTag: sha-2b4242e
