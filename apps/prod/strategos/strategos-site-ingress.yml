# Strategos Site Ingress (product landing page)
# Hosts: strategos.gr + www.strategos.gr
# www: aguardando tofu apply para CNAME entrar em vigor.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: strategos-site
  namespace: strategos
  labels:
    app.kubernetes.io/name: strategos-site
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: strategos
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: strategos-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - strategos.gr
      secretName: strategos-site-strategos-gr-tls
    # www: aguardando tofu apply para CNAME entrar em vigor.
    - hosts:
        - www.strategos.gr
      secretName: strategos-site-www-strategos-gr-tls
  rules:
    - host: strategos.gr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: strategos-site
                port:
                  number: 80
    # www: aguardando tofu apply para CNAME entrar em vigor.
    - host: www.strategos.gr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: strategos-site
                port:
                  number: 80
