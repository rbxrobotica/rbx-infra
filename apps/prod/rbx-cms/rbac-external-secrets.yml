# ServiceAccount and RBAC for External Secrets to read CMS secrets from rbx-ia-br.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-reader
  namespace: rbx-cms

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-cms-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rbx-cms-secrets", "contabo-s3-credentials"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-cms
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-cms
roleRef:
  kind: Role
  name: read-cms-secret
  apiGroup: rbac.authorization.k8s.io
