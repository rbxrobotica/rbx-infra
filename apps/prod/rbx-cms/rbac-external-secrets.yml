# ServiceAccount and RBAC for External Secrets to read CMS secrets from rbx-ia-br.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-reader
  namespace: rbx-cms
# NOTE: the cross-namespace Role/RoleBinding that grant this SA `get` on
# rbx-cms-secrets + contabo-s3-credentials live in the rbx-ia-br namespace
# (apps/prod/rbx-ia-br/rbac-external-secrets-reader.yml). They are intentionally
# NOT defined here — kustomize's `namespace: rbx-cms` override would relocate
# them into rbx-cms, where they would grant nothing.
