# rbx-cms-backend: Go API (drafts, publish to S3, OIDC verify). ClusterIP-only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-cms-backend
  namespace: rbx-cms
  labels:
    app.kubernetes.io/name: rbx-cms-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: rbx-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-cms-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-cms-backend
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/rbxrobotica/rbx-cms
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              # Full URL stored in rbx-cms-secrets. Host should be rbx-cms-postgres
              # (headless Service → jaguar 161.97.147.76): postgres://cms:<pw>@rbx-cms-postgres:5432/cms?sslmode=disable
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: DATABASE_URL
            - name: CMS_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: CMS_SERVICE_KEY
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: OIDC_ISSUER
            - name: CONTABO_S3_ENDPOINT
              value: "https://eu2.contabostorage.com"
            - name: CONTABO_S3_BUCKET
              value: "rbx-content"
            - name: CONTABO_S3_PUBLIC_URL
              value: "https://eu2.contabostorage.com/rbx-content"
            - name: CONTABO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: CONTABO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m

---
# rbx-cms-web: SvelteKit (adapter-node) UI. Handles OIDC auth-code flow, serves
# the editor, and proxies /api/* + /health to rbx-cms-backend with the user token.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-cms-web
  namespace: rbx-cms
  labels:
    app.kubernetes.io/name: rbx-cms-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: rbx-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-cms-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-cms-web
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: ghcr.io/rbxrobotica/rbx-cms-web
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: ORIGIN
              value: "https://cms.rbxsystems.ch"
            - name: BACKEND_URL
              value: "http://rbx-cms-backend"
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: OIDC_ISSUER
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_REDIRECT_URI
              value: "https://cms.rbxsystems.ch/auth/callback"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: SESSION_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
