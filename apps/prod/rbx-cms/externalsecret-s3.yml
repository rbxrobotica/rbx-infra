# ExternalSecret syncs contabo-s3-credentials (rbx-content bucket) from rbx-ia-br.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: contabo-s3-credentials
  namespace: rbx-cms
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: contabo-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_SECRET_ACCESS_KEY
    # Also expose under CONTABO_S3_* for the CMS backend config loader.
    - secretKey: CONTABO_S3_ACCESS_KEY
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_ACCESS_KEY_ID
    - secretKey: CONTABO_S3_SECRET_KEY
      remoteRef:
        key: contabo-s3-credentials
        property: AWS_SECRET_ACCESS_KEY
