# rbx-cms DB migration Job
#
# Managed by ArgoCD as a Sync hook. Runs before the rbx-cms Deployment wave
# on every sync and is safe to re-run because `rbx-cms migrate` is idempotent.
#
# The Job uses the same backend image as the Deployment and only needs
# DATABASE_URL from the existing cms secret.
apiVersion: batch/v1
kind: Job
metadata:
  name: rbx-cms-db-migrate
  namespace: rbx-cms
  labels:
    app.kubernetes.io/name: rbx-cms-backend
    app.kubernetes.io/component: db-migrate
    app.kubernetes.io/part-of: rbx-cms
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-cms-backend
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: migrate
          image: ghcr.io/rbxrobotica/rbx-cms
          imagePullPolicy: IfNotPresent
          command:
            - /rbx-cms
            - migrate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: DATABASE_URL
            - name: CMS_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: CMS_SERVICE_KEY
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: rbx-cms-secrets
                  key: OIDC_ISSUER
            - name: CONTABO_S3_ENDPOINT
              value: "https://eu2.contabostorage.com"
            - name: CONTABO_S3_BUCKET
              value: "rbx-content"
            - name: CONTABO_S3_PUBLIC_URL
              value: "https://eu2.contabostorage.com/rbx-content"
            - name: CONTABO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: CONTABO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
