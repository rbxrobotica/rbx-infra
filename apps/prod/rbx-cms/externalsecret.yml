# ExternalSecret syncs rbx-cms-secrets from rbx-ia-br namespace.
# The rbx-ia-br/rbx-cms-secrets Secret must hold:
#   DATABASE_URL       - postgres://cms:<pw>@rbx-cms-postgres:5432/cms?sslmode=disable
#   CMS_SERVICE_KEY    - static key for machine /api/v1 access
#   OIDC_ISSUER        - https://auth.merovelis.com
#   OIDC_CLIENT_ID     - ZITADEL client id for the CMS web UI
#   OIDC_CLIENT_SECRET - ZITADEL client secret (confidential client)
#   SESSION_SECRET     - 32+ bytes random; signs the web session cookie
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-cms-secrets
  namespace: rbx-cms
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-cms-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: rbx-cms-secrets
        property: DATABASE_URL
    - secretKey: CMS_SERVICE_KEY
      remoteRef:
        key: rbx-cms-secrets
        property: CMS_SERVICE_KEY
    - secretKey: OIDC_ISSUER
      remoteRef:
        key: rbx-cms-secrets
        property: OIDC_ISSUER
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: rbx-cms-secrets
        property: OIDC_CLIENT_ID
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: rbx-cms-secrets
        property: OIDC_CLIENT_SECRET
    - secretKey: SESSION_SECRET
      remoteRef:
        key: rbx-cms-secrets
        property: SESSION_SECRET
