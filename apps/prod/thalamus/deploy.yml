apiVersion: apps/v1
kind: Deployment
metadata:
  name: thalamus-server
  namespace: thalamus
  labels:
    app.kubernetes.io/name: thalamus-server
    app.kubernetes.io/part-of: thalamus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thalamus-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thalamus-server
        app.kubernetes.io/part-of: thalamus
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: thalamus-server
          # Tag pinned via the kustomize images transformer
          # (kustomization.yml newTag), per Pattern R.
          image: ghcr.io/rbxrobotica/thalamus-core:latest
          imagePullPolicy: IfNotPresent
          args: ["/etc/thalamus/policy.json"]
          ports:
            - containerPort: 8080
              name: http
          env:
            # Durable audit (Phase 2): authoritative store on jaguar. The
            # server fails fast at startup and fails closed at runtime when
            # the audit store is unavailable.
            - name: THALAMUS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: thalamus-db
                  key: database-url
            # LiteLLM as internal backend only (§4): never exposed to
            # callers; Thalamus is the single institutional LLM endpoint.
            - name: LITELLM_ENDPOINT
              value: "http://litellm.llm-gateway.svc.cluster.local:4000"
            # DB-less LiteLLM authenticates with the master key; the key
            # lives only in this adapter (callers authenticate to Thalamus).
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thalamus-litellm
                  key: api-key
            # Gate A governed surface: credential middleware backed by
            # rbx-token-service introspection (sync the rbx-token-service
            # app BEFORE this one — /readyz probes the endpoint).
            - name: THALAMUS_RBX_API
              value: "on"
            # Institutional model aliases (Gate 0 item 1): policy speaks
            # aliases like coding.standard; only this map knows the gateway
            # model name. Malformed JSON fails startup.
            - name: THALAMUS_MODEL_MAP
              value: '{"coding.standard": "anthropic/glm-5.2"}'
            - name: THALAMUS_TOKEN_INTROSPECTION_URL
              value: "http://rbx-token-service.rbx-identity.svc.cluster.local:8082/v1/delegation/introspect"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: policy
              mountPath: /etc/thalamus
              readOnly: true
      volumes:
        - name: policy
          configMap:
            name: thalamus-policy
