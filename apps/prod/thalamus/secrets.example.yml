# NEVER commit real values (pass = source of truth: rbx/thalamus/db-password).
# Create the secret out-of-band before first sync:
#
#   kubectl -n thalamus create secret generic thalamus-db \
#     --from-literal=database-url="postgres://thalamus_app:$(pass show rbx/thalamus/db-password)@thalamus-postgres.thalamus.svc.cluster.local:5432/thalamus"
#
apiVersion: v1
kind: Secret
metadata:
  name: thalamus-db
  namespace: thalamus
type: Opaque
stringData:
  database-url: postgres://thalamus_app:REPLACE_ME@thalamus-postgres.thalamus.svc.cluster.local:5432/thalamus
