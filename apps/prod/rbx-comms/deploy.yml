apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-comms
  namespace: rbx-comms
  labels:
    app.kubernetes.io/name: rbx-comms
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: rbx-comms
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-comms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-comms
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/rbxrobotica/rbx-comms:sha-216c09b
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-comms-secrets
                  key: DATABASE_URL
            - name: POSTMARK_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rbx-contact-secrets
                  key: POSTMARK_SERVER_TOKEN
            - name: D360_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-contact-secrets
                  key: D360_API_KEY
            - name: WHATSAPP_NUMBER
              value: "5511913734954"
            - name: ALTCHA_SECRET
              valueFrom:
                secretKeyRef:
                  name: rbx-contact-secrets
                  key: ALTCHA_SECRET
            - name: METRICS_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
