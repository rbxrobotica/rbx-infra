# ExternalSecret syncs rbx-contact-secrets from rbx-ia-br namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-contact-secrets
  namespace: rbx-comms
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-contact-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTMARK_SERVER_TOKEN
      remoteRef:
        key: rbx-contact-secrets
        property: POSTMARK_SERVER_TOKEN
    - secretKey: D360_API_KEY
      remoteRef:
        key: rbx-contact-secrets
        property: D360_API_KEY
    - secretKey: ALTCHA_SECRET
      remoteRef:
        key: rbx-contact-secrets
        property: ALTCHA_SECRET
