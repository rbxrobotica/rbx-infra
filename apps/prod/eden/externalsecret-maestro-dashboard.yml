apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: eden-maestro-dashboard-key
  namespace: eden
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: eden-maestro-dashboard-key
    creationPolicy: Owner
  data:
    - secretKey: key
      remoteRef:
        key: eden-maestro-dashboard-key
        property: key
