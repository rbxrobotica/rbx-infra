apiVersion: apps/v1
kind: Deployment
metadata:
  name: eden-api
  namespace: eden
  labels:
    app.kubernetes.io/name: eden-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: eden
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eden-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eden-api
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - analytics
      containers:
        - name: api
          image: ghcr.io/rbxrobotica/eden-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: PORT
              value: "3001"
            - name: EDEN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: eden-api-token
                  key: token
            - name: EDEN_S3_BUCKET
              value: "rbx-memory"
            - name: CONTABO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: CONTABO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
