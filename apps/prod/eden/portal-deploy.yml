apiVersion: apps/v1
kind: Deployment
metadata:
  name: eden-portal
  namespace: eden
  labels:
    app.kubernetes.io/name: eden-portal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: eden
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eden-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eden-portal
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - analytics
      containers:
        - name: portal
          image: ghcr.io/rbxrobotica/eden-portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 250m
