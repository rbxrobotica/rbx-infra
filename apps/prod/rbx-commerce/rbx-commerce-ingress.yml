# Ingress: commerce.rbx.ia.br + commerce.rbxsystems.ch
# /api/v1, /webhooks, /health go straight to the Go backend (server-to-server
# callers with their own bearer tokens). /api and everything else (including
# /oidc/* login) go to the SvelteKit frontend, which proxies /api/* to the Go
# backend server-side after attaching the session's ID token. Traefik routes
# by longest path-prefix match, so the more specific /api/v1 rule still wins
# over /api for those callers.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rbx-commerce
  namespace: rbx-commerce
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - commerce.rbx.ia.br
        - commerce.rbxsystems.ch
      secretName: rbx-commerce-tls
  rules:
    - host: commerce.rbx.ia.br
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce-web
                port:
                  number: 80
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce-web
                port:
                  number: 80
    - host: commerce.rbxsystems.ch
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce-web
                port:
                  number: 80
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rbx-commerce-web
                port:
                  number: 80
