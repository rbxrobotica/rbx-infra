# ExternalSecret syncs rbx-commerce-secrets from rbx-ia-br namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-commerce-secrets
  namespace: rbx-commerce
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-commerce-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: rbx-commerce-secrets
        property: DATABASE_URL
    - secretKey: COMMS_API_URL
      remoteRef:
        key: rbx-commerce-secrets
        property: COMMS_API_URL
    - secretKey: ASAAS_API_KEY
      remoteRef:
        key: rbx-commerce-secrets
        property: ASAAS_API_KEY
