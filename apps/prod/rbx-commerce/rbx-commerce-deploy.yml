# Deployment: rbx-commerce
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-commerce
  namespace: rbx-commerce
  labels:
    app.kubernetes.io/name: rbx-commerce
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: rbx-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-commerce
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-commerce
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/rbxrobotica/rbx-commerce:sha-d6dd068
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: DATABASE_URL
            - name: COMMS_API_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: COMMS_API_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
