# Deployment: rbx-commerce
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-commerce
  namespace: rbx-commerce
  labels:
    app.kubernetes.io/name: rbx-commerce
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: rbx-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-commerce
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-commerce
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api
          image: ghcr.io/rbxrobotica/rbx-commerce:sha-303380d35795789c68b8e89bf2aec0864854196d
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: DATABASE_URL
            - name: COMMS_API_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: COMMS_API_URL
            # Payment provider configuration (ADR-0009)
            - name: ASAAS_ENV
              value: "production"
            - name: ASAAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: ASAAS_API_KEY
                  optional: false
            - name: ASAAS_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: ASAAS_WEBHOOK_TOKEN
                  optional: true
            - name: BTCPAY_URL
              value: "http://btcpay-server.btc-pay.svc.cluster.local:23001"
            - name: BTCPAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: BTCPAY_API_KEY
                  optional: true
            - name: PAYREXX_INSTANCE
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: PAYREXX_INSTANCE
                  optional: true
            - name: PAYREXX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-commerce-secrets
                  key: PAYREXX_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
