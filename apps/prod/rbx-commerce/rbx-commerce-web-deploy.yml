# Deployment: rbx-commerce-web (SvelteKit frontend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-commerce-web
  namespace: rbx-commerce
  labels:
    app.kubernetes.io/name: rbx-commerce-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: rbx-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-commerce-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-commerce-web
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/rbxrobotica/rbx-commerce-web:sha-8ddc28b449e258a3e8508498f1b8ef52bf99f5b5
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: ORIGIN
              value: "https://commerce.rbxsystems.ch"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
