# Deployment: rbx-commerce-web (SvelteKit frontend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-commerce-web
  namespace: rbx-commerce
  labels:
    app.kubernetes.io/name: rbx-commerce-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: rbx-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-commerce-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-commerce-web
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/rbxrobotica/rbx-commerce-web:sha-30c525c96c904c45824311a9e32f59a4644d56ff
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: ORIGIN
              value: "https://commerce.rbxsystems.ch"
            # OIDC login (Authorization Code + PKCE) served at /oidc/*.
            # Public client — no secret to manage. See rbxrobotica/rbx-commerce PR
            # "feat(web): add server-side OIDC login".
            - name: OIDC_ISSUER
              value: "https://auth.merovelis.com"
            - name: OIDC_CLIENT_ID
              value: "380956048132931619"
            - name: OIDC_REDIRECT_URI
              value: "https://commerce.rbxsystems.ch/oidc/callback"
            - name: OIDC_POST_LOGOUT_REDIRECT_URI
              value: "https://commerce.rbxsystems.ch/"
            # Internal commerce API this pod proxies /api/* to, server-side,
            # attaching the caller's session token.
            - name: COMMERCE_INTERNAL_URL
              value: "http://rbx-commerce.rbx-commerce.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
