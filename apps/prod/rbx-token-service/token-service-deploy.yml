# rbx-token-service (ADR-0101 Gate A first slice): opaque delegated session
# credentials with issue/introspect/revoke. Registry is in-memory in this
# slice — a pod restart revokes every outstanding credential (acceptable for
# the pilot; ZITADEL token-exchange replaces issuance without changing the
# Thalamus session model).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-token-service
  namespace: rbx-identity
  labels:
    app.kubernetes.io/name: rbx-token-service
    app.kubernetes.io/part-of: rbx-identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-token-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-token-service
        app.kubernetes.io/part-of: rbx-identity
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: rbx-token-service
          image: ghcr.io/rbxrobotica/rbx-token-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: RBX_TOKEN_SERVICE_BIND_ADDR
              value: "0.0.0.0:8082"
            - name: RBX_TOKEN_SERVICE_DELEGATION
              value: "on"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
