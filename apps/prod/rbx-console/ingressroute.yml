# IngressRoute: rbx-console (operational console)
# rbx.ia.br DNS: ação manual necessária — zona não está no módulo OpenTofu
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rbx-console
  namespace: rbx-console
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # HTTP → HTTPS redirect
    - match: Host(`console.rbxsystems.ch`) || Host(`console.rbx.ia.br`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-https
          namespace: rbx-console
      services:
        - name: rbx-console
          port: 80
    # HTTPS traffic
    - match: Host(`console.rbxsystems.ch`) || Host(`console.rbx.ia.br`)
      kind: Rule
      priority: 10
      services:
        - name: rbx-console
          port: 80
  tls:
    secretName: rbx-console-tls
