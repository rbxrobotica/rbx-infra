# Deployment: rbx-console (operational console)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-console
  namespace: rbx-console
  labels:
    app.kubernetes.io/name: rbx-console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: rbx-console
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-console
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - analytics
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rbx-console
                topologyKey: kubernetes.io/hostname
      containers:
        - name: console
          image: ghcr.io/rbxrobotica/rbx-console:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: RBX_CONSOLE_USERS_ACCESS_SOURCE
              value: owner-systems
            - name: RBX_IDENTITY_USERS_ACCESS_BASE_URL
              value: http://rbx-session-bff.rbx-identity.svc.cluster.local:8081
            - name: RBX_COMMERCE_USERS_ACCESS_BASE_URL
              value: http://rbx-commerce.rbx-commerce.svc.cluster.local
            - name: RBX_IDENTITY_USERS_ACCESS_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-console-users-access
                  key: RBX_IDENTITY_USERS_ACCESS_SERVICE_KEY
            - name: RBX_COMMERCE_USERS_ACCESS_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: rbx-console-users-access
                  key: RBX_COMMERCE_USERS_ACCESS_SERVICE_KEY
            - name: RBX_COMMERCE_USERS_ACCESS_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: rbx-console-users-access
                  key: RBX_COMMERCE_USERS_ACCESS_TENANT_ID
            # --- Console dedicated session-BFF (BFF session mode) ---
            # Activation order: (1) rbx-console image including PRs #14/#15/#16
            # must be published and the kustomization newTag bumped; (2) the
            # rbx-console-session-bff pod must be Running (Secret provisioned);
            # (3) only then does RBX_CONSOLE_SESSION_MODE=bff take effect. Until
            # then the Console keeps its current (disabled) resolver behaviour.
            - name: RBX_CONSOLE_SESSION_MODE
              value: bff
            - name: RBX_CONSOLE_SESSION_BFF_BASE_URL
              value: http://rbx-console-session-bff.rbx-console.svc.cluster.local:8081
            - name: RBX_CONSOLE_OPERATOR_AUDIENCE
              value: rbx-console
            # Fixed server tenant. Assumes it equals the commerce users-access
            # tenant already mounted below the same secret; confirm at review and
            # adjust the key if the Console session tenant differs.
            - name: RBX_CONSOLE_INITIAL_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: rbx-console-users-access
                  key: RBX_COMMERCE_USERS_ACCESS_TENANT_ID
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
