# Dedicated RBX Console product-local session BFF.
# This manifest is inert until its ExternalSecret is provisioned and a later
# authorized Console adapter release consumes the service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-console-session-bff
  namespace: rbx-console
  labels:
    app.kubernetes.io/name: rbx-console-session-bff
    app.kubernetes.io/component: session-bff
    app.kubernetes.io/part-of: rbx-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-console-session-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-console-session-bff
        app.kubernetes.io/component: session-bff
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: session-bff
          image: ghcr.io/rbxrobotica/rbx-session-bff:sha-ee43b15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - secretRef:
                name: rbx-console-session-bff-oidc
          env:
            - name: RBX_IDENTITY_ISSUER
              value: https://auth.merovelis.com
            - name: RBX_SESSION_BFF_DISCOVER_OIDC
              value: "true"
            - name: RBX_SESSION_BFF_REDIRECT_URI
              value: https://console.rbxsystems.ch/api/auth/callback
            - name: RBX_SESSION_BFF_BIND_ADDR
              value: 0.0.0.0:8081
            - name: RBX_SESSION_COOKIE_NAME
              value: __Host-rbx_console_session
            - name: RBX_SESSION_CSRF_COOKIE_NAME
              value: __Host-rbx_console_csrf
            - name: RBX_SESSION_REDIS_KEY_PREFIX
              value: "rbx:console:session:"
            - name: RBX_SESSION_BFF_SCOPES
              value: openid profile email
            # Enables the PII-free /api/v1/operator-context endpoint (rbx-identity #10).
            # Without it the endpoint returns 404 and the Console resolver cannot bind.
            - name: RBX_SESSION_BFF_OPERATOR_AUDIENCE
              value: rbx-console
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: rbx-console-session-bff
  namespace: rbx-console
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rbx-console-session-bff
  ports:
    - name: http
      port: 8081
      targetPort: http
