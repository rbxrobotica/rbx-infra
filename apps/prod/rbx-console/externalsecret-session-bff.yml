# References only. Values are provisioned outside Git in the rbx-console namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-console-session-bff-oidc
  namespace: rbx-console
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-console-session-bff-oidc
    creationPolicy: Owner
  data:
    - secretKey: RBX_SESSION_BFF_CLIENT_ID
      remoteRef:
        key: rbx-console-session-bff-oidc
        property: RBX_SESSION_BFF_CLIENT_ID
    - secretKey: RBX_SESSION_BFF_CLIENT_SECRET
      remoteRef:
        key: rbx-console-session-bff-oidc
        property: RBX_SESSION_BFF_CLIENT_SECRET
    - secretKey: RBX_SESSION_REDIS_URL
      remoteRef:
        key: rbx-console-session-bff-oidc
        property: RBX_SESSION_REDIS_URL
