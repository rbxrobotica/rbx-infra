# SecretStore for reading shared content secrets from rbx-ia-br namespace
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-store
  namespace: lda-prod
spec:
  provider:
    kubernetes:
      auth:
        serviceAccount:
          name: external-secrets-reader
      remoteNamespace: rbx-ia-br
      server:
        url: https://kubernetes.default.svc.cluster.local
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
