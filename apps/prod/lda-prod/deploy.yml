# Deployment: leandrodamasio.rbx.ia.br
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lda-prod
  namespace: lda-prod
  labels:
    app.kubernetes.io/name: lda-prod
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: lda-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lda-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lda-prod
        app.kubernetes.io/component: frontend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - analytics
      containers:
        - name: lda-frontend
          image: docker.io/ldamasio/lda-prod
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: CONTABO_S3_ENDPOINT
              value: "https://eu2.contabostorage.com"
            - name: CONTABO_S3_CONTENT_BUCKET
              value: "rbx-content"
            - name: CONTABO_S3_PUBLIC_URL
              value: "https://eu2.contabostorage.com/rbx-content"
            - name: CONTABO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: CONTABO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: contabo-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
