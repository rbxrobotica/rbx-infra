# Kustomization for Merovelis Production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - middleware-https.yml
  - merovelis-site-deploy.yml
  - merovelis-site-svc.yml
  - merovelis-site-ingress.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: merovelis
      environment: production
    includeSelectors: false

images:
  # Tag promoted by ArgoCD Image Updater (git write-back to this file).
  # See gitops/app-of-apps/merovelis-prod.yml and docs/infra/IMAGE-PROMOTION.md.
  - name: ghcr.io/rbxrobotica/merovelis-site
    newTag: sha-2a8a031
