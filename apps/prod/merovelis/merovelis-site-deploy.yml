# Merovelis Site Deployment (public institutional site for merovelis.com)
# Image is published by ldamasio/merovelis-site GitHub Actions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: merovelis-site
  namespace: merovelis
  labels:
    app.kubernetes.io/name: merovelis-site
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: merovelis
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: merovelis-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: merovelis-site
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-ldamasio
      containers:
        - name: merovelis-site
          # Immutable sha tag published by ldamasio/merovelis-site CI.
          image: ghcr.io/ldamasio/merovelis-site:sha-051df55
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
