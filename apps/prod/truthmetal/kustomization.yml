apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - middleware-https.yml
  - postgres-svc.yml
  - redis-deploy.yml
  - redis-svc.yml
  - deploy.yml
  - svc.yml
  - ingress.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: truthmetal
      environment: production
    includeSelectors: false
    includeTemplates: true

patches:
  # Preserve the Deployment selectors that commonLabels previously rendered.
  # Deployment selectors are immutable, so keeping them stable avoids replacement.
  - target:
      kind: Deployment
      name: truthmetal
    patch: |-
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1part-of
        value: truthmetal
      - op: add
        path: /spec/selector/matchLabels/environment
        value: production
  - target:
      kind: Deployment
      name: truthmetal-redis
    patch: |-
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1part-of
        value: truthmetal
      - op: add
        path: /spec/selector/matchLabels/environment
        value: production
