apiVersion: apps/v1
kind: Deployment
metadata:
  name: truthmetal-redis
  namespace: truthmetal
  labels:
    app.kubernetes.io/name: truthmetal-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: truthmetal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: truthmetal-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: truthmetal-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 100m
