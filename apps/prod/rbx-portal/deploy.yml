apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-portal
  namespace: rbx-portal
  labels:
    app.kubernetes.io/name: rbx-portal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: rbx-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-portal
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rbx-portal
                topologyKey: kubernetes.io/hostname
      containers:
        - name: portal
          image: ghcr.io/rbxrobotica/rbx-portal:sha-0000000
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: rbx-portal-config
            - secretRef:
                name: rbx-portal-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
