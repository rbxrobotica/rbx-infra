# SecretStore mirroring the rbx-console pattern: reads secrets from the rbx-ia-br
# namespace via a service account. Operator must create the source secret there.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: kubernetes-store
  namespace: rbx-portal
spec:
  provider:
    kubernetes:
      auth:
        serviceAccount:
          name: external-secrets-reader
      remoteNamespace: rbx-ia-br
      server:
        caProvider:
          key: ca.crt
          name: kube-root-ca.crt
          type: ConfigMap
        url: https://kubernetes.default.svc.cluster.local
