# Pulls OIDC_CLIENT_SECRET and SESSION_SECRET from the rbx-ia-br source secret
# named rbx-portal-secrets. Operator creates that source secret (via pass).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rbx-portal-secrets
  namespace: rbx-portal
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-portal-secrets
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: rbx-portal-secrets
        property: OIDC_CLIENT_SECRET
    - secretKey: SESSION_SECRET
      remoteRef:
        key: rbx-portal-secrets
        property: SESSION_SECRET
