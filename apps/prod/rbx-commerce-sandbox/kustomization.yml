apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rbx-commerce-sandbox

resources:
  - namespace.yml
  - rbac-external-secrets.yml
  - secretstore.yml
  - rbx-commerce-sandbox-secret.yml
  - paradedb-svc.yml
  - rbx-commerce-sandbox-ingress.yml
  - rbx-commerce-sandbox-deploy.yml
  - rbx-commerce-sandbox-svc.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: rbx-commerce
      environment: sandbox
    includeSelectors: false
