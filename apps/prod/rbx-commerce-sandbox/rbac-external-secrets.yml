# ServiceAccount and RBAC for External Secrets to read sandbox commerce secrets from rbx-ia-br
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-reader
  namespace: rbx-commerce-sandbox

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-commerce-sandbox-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rbx-commerce-sandbox-secrets"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-commerce-sandbox
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-commerce-sandbox
roleRef:
  kind: Role
  name: read-commerce-sandbox-secret
  apiGroup: rbac.authorization.k8s.io
