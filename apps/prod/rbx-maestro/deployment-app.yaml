apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-maestro
  namespace: rbx-maestro
  labels:
    app.kubernetes.io/name: rbx-maestro
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-maestro
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-maestro
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: maestro
          image: ghcr.io/rbxrobotica/rbx-maestro:df4a4d18045536721505dca45adfd40f7de1f71e
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-maestro-db
                  key: url
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
