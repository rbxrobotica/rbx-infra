apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-maestro
  namespace: rbx-maestro
  labels:
    app.kubernetes.io/name: rbx-maestro
spec:
  replicas: 1
  # Recreate: maestro deploys carry DB migrations in initContainers; the old
  # binary must never overlap a post-migration schema (Codex finding, PR #41).
  # Seconds of downtime per rollout is the right trade for an internal
  # control-plane service with replicas: 1.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-maestro
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-maestro
    spec:
      serviceAccountName: rbx-maestro
      imagePullSecrets:
        - name: ghcr-pull-secret
      # Run pending DB migrations before the app starts. Migrations ship
      # inside the app image (/app/migrations); golang-migrate applies them.
      # Required for maestro migration 002 (canonical mission statuses +
      # agent-loop tables) — the new binary cannot serve against the old
      # schema (mission_runs gains stop_reason/mission_code/merged_at).
      initContainers:
        - name: copy-migrations
          image: ghcr.io/rbxrobotica/rbx-maestro:sha-e691e504eecf40451c43425a63965055f0ae7d24
          command: ["sh", "-ec", "cp /app/migrations/* /m/"]
          volumeMounts:
            - name: migrations
              mountPath: /m
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: migrate
          image: docker.io/migrate/migrate:v4.18.1
          args: ["-path", "/m", "-database", "$(DATABASE_URL)", "up"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-maestro-db
                  key: url
          volumeMounts:
            - name: migrations
              mountPath: /m
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: migrations
          emptyDir: {}
      containers:
        - name: maestro
          image: ghcr.io/rbxrobotica/rbx-maestro:sha-e691e504eecf40451c43425a63965055f0ae7d24
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbx-maestro-db
                  key: url
            - name: PORT
              value: "8080"
            # Agent-loop surface auth (maestro PR #4): Kubernetes
            # TokenReview, audience rbx-maestro, allowlisted subject
            # mission-runner-sa (rbx-infra ADR-0008 §4).
            - name: AGENT_LOOP_AUTH
              value: "token-review"
            # Workbench runner surface auth (ADR-0009): static key used by
            # Corbetti to poll GET /leases/next. Sourced from ESO-synced
            # Secret corbetti-runner-key (rbx-ia-br → rbx-maestro namespace).
            - name: AGENT_LOOP_RUNNER_KEY
              valueFrom:
                secretKeyRef:
                  name: corbetti-runner-key
                  key: runner-key
            # Éden portal dashboard surface auth (Phase 4): static key used
            # by eden-api to proxy read requests to the dashboard endpoints.
            - name: MAESTRO_DASHBOARD_KEY
              valueFrom:
                secretKeyRef:
                  name: maestro-dashboard-key
                  key: key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
