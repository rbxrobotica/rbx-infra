# ExternalSecret syncs corbetti-runner-key from rbx-ia-br namespace.
# Enables GET /leases/next runner surface auth (ADR-0009 §3).
# Manual Opaque Secret provisioned in rbx-ia-br via bootstrap/scripts/init-vault-from-pass.sh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: corbetti-runner-key
  namespace: rbx-maestro
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: corbetti-runner-key
    creationPolicy: Owner
  data:
    - secretKey: runner-key
      remoteRef:
        key: corbetti-runner-key
        property: runner-key
