# ExternalSecret syncs maestro-dashboard-key from rbx-ia-br namespace.
# Enables the Éden portal dashboard surface (MAESTRO_DASHBOARD_KEY, Phase 4).
# Manual Opaque Secret must be provisioned in rbx-ia-br:
#   kubectl create secret generic maestro-dashboard-key -n rbx-ia-br --from-literal=key=<value>
#   pass insert rbx/maestro/dashboard-key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: maestro-dashboard-key
  namespace: rbx-maestro
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: maestro-dashboard-key
    creationPolicy: Owner
  data:
    - secretKey: key
      remoteRef:
        key: maestro-dashboard-key
        property: key
