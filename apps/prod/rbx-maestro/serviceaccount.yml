# Dedicated ServiceAccount for rbx-maestro (agent-loop TokenReview identity).
# The companion system:auth-delegator ClusterRoleBinding lives in
# platform/rbx-maestro-auth/ — cluster-scoped resources are not permitted
# in the rbx-applications AppProject.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbx-maestro
  namespace: rbx-maestro
  labels:
    app.kubernetes.io/name: rbx-maestro
