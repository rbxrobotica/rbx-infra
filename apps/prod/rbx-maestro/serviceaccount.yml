# Dedicated ServiceAccount for rbx-maestro + TokenReview delegation.
# The agent-loop surface (maestro PR #4) validates the mission-runner's
# projected SA token via the Kubernetes TokenReview API (ADR-0008 §4);
# system:auth-delegator grants exactly tokenreviews/subjectaccessreviews
# create — nothing else.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbx-maestro
  namespace: rbx-maestro
  labels:
    app.kubernetes.io/name: rbx-maestro

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rbx-maestro-auth-delegator
  labels:
    app.kubernetes.io/name: rbx-maestro
    app.kubernetes.io/part-of: agent-loop
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: rbx-maestro
    namespace: rbx-maestro
