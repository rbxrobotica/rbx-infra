# ServiceAccount and RBAC for External Secrets to read secrets from rbx-ia-br
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-reader
  namespace: rbx-ia-br

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-s3-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["contabo-s3-credentials"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-s3
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-ia-br
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbxsystems-ch
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: lda-prod
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: eden
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-comms
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-cms
roleRef:
  kind: Role
  name: read-s3-secret

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-eden-maestro-dashboard-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["eden-maestro-dashboard-key"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-eden-maestro
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: eden
roleRef:
  kind: Role
  name: read-eden-maestro-dashboard-secret
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-contact-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rbx-contact-secrets"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-contact
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbxsystems-ch
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-comms
roleRef:
  kind: Role
  name: read-contact-secret

---

# rbx-cms: read its own app secret (rbx-cms-secrets) from rbx-ia-br.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-cms-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rbx-cms-secrets"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-cms
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-cms
roleRef:
  kind: Role
  name: read-cms-secret
  apiGroup: rbac.authorization.k8s.io

---

# rbx-console: read Users & Access and Commerce service keys from rbx-ia-br.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-rbx-console-users-access-secrets
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - rbx-console-users-access
      - rbx-commerce-secrets
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-rbx-console-users-access
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-console
roleRef:
  kind: Role
  name: read-rbx-console-users-access-secrets
  apiGroup: rbac.authorization.k8s.io

---

# rbxsystems-ch: read the LLM gateway virtual key (rbx-llm-secrets) from rbx-ia-br.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-llm-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rbx-llm-secrets"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-llm
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbxsystems-ch
roleRef:
  kind: Role
  name: read-llm-secret
  apiGroup: rbac.authorization.k8s.io

---

# rbx-console: read its dedicated session-BFF OIDC secret from rbx-ia-br.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-rbx-console-session-bff-oidc
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rbx-console-session-bff-oidc"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-rbx-console-session-bff
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-console
roleRef:
  kind: Role
  name: read-rbx-console-session-bff-oidc
  apiGroup: rbac.authorization.k8s.io
