# ServiceAccount and RBAC for External Secrets to read secrets from rbx-ia-br
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-reader
  namespace: rbx-ia-br

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-s3-secret
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["contabo-s3-credentials"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-s3
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-ia-br
roleRef:
  kind: Role
  name: read-s3-secret
