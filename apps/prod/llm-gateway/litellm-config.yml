# LiteLLM Proxy ConfigMap
# Minimal configuration with placeholder model aliases.
# Real provider keys are injected via Secret (never committed).
# This ConfigMap mounts proxy_config.yaml into the container.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: llm-gateway
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: llm-gateway
data:
  proxy_config.yaml: |
    # LiteLLM Proxy Configuration — Experimental
    # Docs: https://docs.litellm.ai/docs/proxy/configs

    model_list:
      # Placeholder aliases — replace with real models after secret bootstrap.
      # Keys are read from environment variables (os.environ/KEY_NAME).

      - model_name: openai-gpt-4o-placeholder
        litellm_params:
          model: openai/gpt-4o
          api_key: "os.environ/OPENAI_API_KEY"

      - model_name: anthropic-claude-sonnet-placeholder
        litellm_params:
          model: anthropic/claude-3-5-sonnet-20241022
          api_key: "os.environ/ANTHROPIC_API_KEY"

    # General settings
    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"
      database_url: "os.environ/DATABASE_URL"
      # Store virtual keys and spend in external Postgres
      store_model_in_db: false

    # Litellm settings
    litellm_settings:
      # Budget / rate limiting can be added here later
      # For now, keep minimal — no enforcement
      drop_params: true

    # Router settings
    router_settings:
      # Timeout for upstream LLM calls
      timeout: 30
