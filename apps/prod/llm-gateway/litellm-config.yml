# LiteLLM Proxy ConfigMap
# Provider strategy for RBX:
#   1. Groq — first smoke-test provider (free tier available)
#   2. GLM (Z.AI / ZhipuAI) — second provider
#   3. Kimi (Moonshot) — third provider, already paid
#   4. DeepSeek, Qwen, OpenAI, Anthropic — future candidates only
#
# Real provider keys are injected via Secret (never committed).
# This ConfigMap mounts proxy_config.yaml into the container.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: llm-gateway
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: llm-gateway
data:
  proxy_config.yaml: |
    # LiteLLM Proxy Configuration — Experimental
    # Docs: https://docs.litellm.ai/docs/proxy/configs

    model_list:
      # Active providers — initial RBX strategy

      - model_name: groq-test
        litellm_params:
          model: groq/llama-3.3-70b-versatile
          api_key: "os.environ/GROQ_API_KEY"

      - model_name: glm-test
        litellm_params:
          model: anthropic/glm-5.2
          api_base: https://api.z.ai/api/anthropic  # subscription path (Anthropic-compat); zai/ PaaS endpoint has no resource package (code 1113)
          api_key: "os.environ/ZAI_API_KEY"

      - model_name: kimi-moonshot-test
        litellm_params:
          model: moonshot/moonshot-v1-8k
          api_key: "os.environ/MOONSHOT_API_KEY"

      # Future candidates — uncomment and add keys when ready:
      # - model_name: deepseek-test
      #   litellm_params:
      #     model: deepseek/deepseek-chat
      #     api_key: "os.environ/DEEPSEEK_API_KEY"
      # - model_name: qwen-test
      #   litellm_params:
      #     model: dashscope/qwen-plus
      #     api_key: "os.environ/DASHSCOPE_API_KEY"
      # - model_name: openai-gpt-4o
      #   litellm_params:
      #     model: openai/gpt-4o
      #     api_key: "os.environ/OPENAI_API_KEY"
      # - model_name: anthropic-claude-sonnet
      #   litellm_params:
      #     model: anthropic/claude-3-5-sonnet-20241022
      #     api_key: "os.environ/ANTHROPIC_API_KEY"

    # General settings
    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"
      # DB-less mode: run as a stateless routing proxy authenticated by the
      # master key. No database_url => no Prisma => avoids the wolfi/query-engine
      # runtime failure. Virtual keys / spend tracking (DB-backed on jaguar) are
      # deferred until the Prisma issue is resolved or Agentgateway replaces this.
      store_model_in_db: false

    # Litellm settings
    litellm_settings:
      # Budget / rate limiting can be added here later
      # For now, keep minimal — no enforcement
      drop_params: true

    # Router settings
    router_settings:
      # Timeout for upstream LLM calls
      timeout: 30
