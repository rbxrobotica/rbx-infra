# LiteLLM Proxy Service (ClusterIP only)
# Internal exposure on port 4000. No LoadBalancer, no NodePort.
# Other pods in the cluster can reach the proxy at:
#   http://litellm.llm-gateway.svc.cluster.local:4000
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: llm-gateway
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: llm-gateway
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
