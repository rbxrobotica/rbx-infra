# Secret Example: llm-gateway
#
# This file is DOCUMENTATION ONLY. It is NOT included in kustomization.yml
# and must NEVER be synced by ArgoCD.
#
# This is a template — actual secrets must be created via the Ansible k8s-secrets
# role (reads from pass) or manually by an operator.
#
# NEVER commit real values to git. ArgoCD manages only non-sensitive manifests.
# See docs/infra/SECRETS.md for the pass namespace structure and bootstrap flow.
#
# Required pass entries (suggested paths):
#   rbx/llm-gateway/master-key          → LITELLM_MASTER_KEY
#   rbx/llm-gateway/database-url        → DATABASE_URL
#   rbx/llm-gateway/salt-key            → LITELLM_SALT_KEY (optional, for credential encryption)
#   rbx/llm-gateway/openai-api-key      → OPENAI_API_KEY
#   rbx/llm-gateway/anthropic-api-key   → ANTHROPIC_API_KEY
#
# After adding pass entries, run:
#   ansible-playbook bootstrap/ansible/site.yml -i bootstrap/ansible/inventory/hosts.yml --tags k8s-secrets
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: llm-gateway
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: llm-gateway
  annotations:
    # Uncomment if using external-secrets operator
    # external-secrets.io/provider: kubernetes
    # external-secrets.io/secret-name: llm-gateway/secrets
type: Opaque
stringData:
  # LiteLLM master key — used to authenticate clients to the proxy.
  # Generate with: openssl rand -hex 32
  master-key: "CHANGE_ME_MASTER_KEY"

  # External Postgres connection string.
  # Format: postgresql://user:password@jaguar:5432/litellm
  # The user and database must be provisioned on jaguar by Ansible.
  database-url: "postgresql://litellm:CHANGE_ME@jaguar:5432/litellm"

  # Salt key for encrypting credentials stored in the DB.
  # Generate with: openssl rand -hex 32
  salt-key: "CHANGE_ME_SALT_KEY"

  # Provider API keys (placeholders — add/remove providers as needed).
  openai-api-key: "sk-CHANGE_ME_OPENAI"
  anthropic-api-key: "sk-ant-CHANGE_ME_ANTHROPIC"
