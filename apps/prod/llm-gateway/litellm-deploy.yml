# LiteLLM Proxy Deployment (Experimental)
#
# Single-replica, Recreate strategy.
# Exposed ONLY internally on port 4000 (ClusterIP).
# No Ingress in this revision — access via port-forward or from other
# pods inside the cluster.
#
# Image: ghcr.io/berriai/litellm
# Pinned to v1.83.14-stable (amd64 digest) — immutable release tag.
# Cosign signature available for independent verification.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: llm-gateway
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: llm-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/component: proxy
        app.kubernetes.io/part-of: llm-gateway
    spec:
      serviceAccountName: litellm
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: litellm
          # Pinned to v1.83.14-stable (amd64 digest) — immutable release tag.
          # Verified via docker manifest inspect on 2026-05-09.
          # Cosign signature available; verify with:
          #   cosign verify --key https://raw.githubusercontent.com/BerriAI/litellm/0112e53046018d726492c814b3644b7d376029d0/cosign.pub ghcr.io/berriai/litellm:v1.83.14-stable
          image: ghcr.io/berriai/litellm:v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 4000
              name: http
              protocol: TCP

          command:
            - "litellm"
          args:
            - "--config"
            - "/app/proxy_config.yaml"
            - "--port"
            - "4000"

          env:
            # Writable HOME so Prisma can create its engine cache (/tmp/.cache).
            # The container is non-root (uid 1000) and would otherwise fail with
            # PermissionError on '/.cache'. Backed by the `tmp` emptyDir below.
            - name: HOME
              value: "/tmp"

            # Master key — proxy will reject requests without this bearer token
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key

            # External Postgres on jaguar
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: database-url

            # Salt key for encrypting DB-stored credentials
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: salt-key

            # Provider API keys — RBX initial strategy:
            #   1. Groq (free tier, good for smoke tests)
            #   2. GLM / Z.AI (ZhipuAI)
            #   3. Kimi / Moonshot (paid, already contracted)
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: groq-api-key
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: zai-api-key
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: moonshot-api-key

          volumeMounts:
            - name: config
              mountPath: /app/proxy_config.yaml
              subPath: proxy_config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp

          resources:
            # LiteLLM v1.83 boots Prisma (engine generate + migrate deploy),
            # which spikes well past 256Mi and was OOMKilled (exit 137).
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"

          # LiteLLM exposes /health/liveliness and /health/readiness
          # Conservative timings to avoid premature restarts during DB migration.
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: tmp
          emptyDir: {}

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
