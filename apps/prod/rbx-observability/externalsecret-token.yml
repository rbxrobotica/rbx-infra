apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rbx-observability-token
  namespace: rbx-observability
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: kubernetes-store
    kind: SecretStore
  target:
    name: rbx-observability-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: rbx-observability-token
        property: token
