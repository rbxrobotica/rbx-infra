# RBAC for rbx-observability's external-secrets-reader SA to read its source
# secrets from rbx-ia-br. The SA itself is defined in secretstore.yml (this file
# only grants least-privilege read on the secrets rbx-observability consumes).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-rbx-observability-secrets
  namespace: rbx-ia-br
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - rbx-observability-token
      - rbx-observability-langfuse
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-reader-observability
  namespace: rbx-ia-br
subjects:
  - kind: ServiceAccount
    name: external-secrets-reader
    namespace: rbx-observability
roleRef:
  kind: Role
  name: read-rbx-observability-secrets
  apiGroup: rbac.authorization.k8s.io
