# IngressRoute: rbx-comms-console (operator frontend)
# rbx.ia.br DNS: ação manual necessária — zona não está no módulo OpenTofu
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rbx-comms-console
  namespace: rbx-comms
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # HTTP → HTTPS redirect
    - match: Host(`comms.rbxsystems.ch`) || Host(`comms.rbx.ia.br`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-https
          namespace: rbx-comms
      services:
        - name: rbx-comms-console
          port: 80
    # HTTPS traffic
    - match: Host(`comms.rbxsystems.ch`) || Host(`comms.rbx.ia.br`)
      kind: Rule
      priority: 10
      services:
        - name: rbx-comms-console
          port: 80
  tls:
    secretName: rbx-comms-console-comms-tls
