# Certificate: console.rbxsystems.ch + console.rbx.ia.br
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rbx-comms-console-tls
  namespace: rbx-comms
spec:
  dnsNames:
    - console.rbxsystems.ch
    - console.rbx.ia.br
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: rbx-comms-console-tls
  usages:
    - digital signature
    - key encipherment
