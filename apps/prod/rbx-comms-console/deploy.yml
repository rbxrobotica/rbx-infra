# Deployment: rbx-comms-console (operator frontend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbx-comms-console
  namespace: rbx-comms
  labels:
    app.kubernetes.io/name: rbx-comms-console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: rbx-comms
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rbx-comms-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbx-comms-console
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: NotIn
                    values:
                      - analytics
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rbx-comms-console
                topologyKey: kubernetes.io/hostname
      containers:
        - name: console
          image: ghcr.io/rbxrobotica/rbx-comms-console:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
