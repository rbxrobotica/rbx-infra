# Kustomization for rbx-comms-console (operator frontend)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rbx-comms

resources:
  - certificate.yml
  - deploy.yml
  - svc.yml
  - ingressroute.yml

commonLabels:
  app.kubernetes.io/part-of: rbx-comms
  environment: production

images:
  - name: ghcr.io/rbxrobotica/rbx-comms-console
    newTag: latest
