# Per-agent ServiceAccounts for the Corbetti devbox (ADR-0500 Amendment 2026-07).
# One SA per coding agent for kube-audit attribution (ai-agent-security-policy §1).
# automountServiceAccountToken: false — these SAs never run as pods; tokens are minted
# out-of-band (rbx-agent-tokens Ansible role) into kubeconfigs delivered to Corbetti.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: corbetti-claude
  namespace: corbetti-agents
  labels:
    app.kubernetes.io/name: corbetti-claude
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: corbetti-codex
  namespace: corbetti-agents
  labels:
    app.kubernetes.io/name: corbetti-codex
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: corbetti-kimi
  namespace: corbetti-agents
  labels:
    app.kubernetes.io/name: corbetti-kimi
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: corbetti-glm
  namespace: corbetti-agents
  labels:
    app.kubernetes.io/name: corbetti-glm
automountServiceAccountToken: false
