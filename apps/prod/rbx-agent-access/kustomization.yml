# Kustomization for rbx-agent-access: per-agent ServiceAccounts + scoped WRITE RBAC
# for the Corbetti devbox. ADR-0500 Amendment 2026-07 / rbx-security AGENT-KUBE-001.
# rbac.yml is GENERATED by gen-rbac.sh (8 Roles + 32 RoleBindings) — regenerate on
# scope change, then commit the output. The ValidatingAdmissionPolicy guardrail lives
# under platform/agent-access/ (rbx-platform project, cluster-scoped).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace (corbetti-agents) — sync-wave -1
  - namespace.yml
  # 4 per-agent ServiceAccounts
  - serviceaccounts.yml
  # 8 Roles + 32 RoleBindings (generated)
  - rbac.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: rbx-agent-access
    includeSelectors: false
