ansible_user: root
ansible_ssh_private_key_file: ~/.ssh/id_ed25519

# k3s version — check latest at https://github.com/k3s-io/k3s/releases
k3s_version: "v1.32.3+k3s1"

# Tiger public IP — used as TLS SAN so kubectl works without tunnel
k3s_server_ip: "158.220.116.31"

# Your local machine's public IPs — port 6443 will be restricted to these only
# IPv4: curl -4s ifconfig.me  |  IPv6: curl -6s ifconfig.me
kubectl_allowed_ips:
  - "189.120.75.123"
  - "2804:14c:13b:8448:59dd:2bd1:2969:804"

# SSH hardening
ssh_port: 22

# ParadeDB on jaguar — used by all apps
# Database names and users are non-sensitive (committed here)
# Passwords live in group_vars/vault.yml (gitignored — never commit)

# robson (robsond production daemon — event-sourced)
paradedb_robson_db: "robson"
paradedb_robson_user: "robson"

# robson_testnet (testnet daemon — isolated from production robson)
paradedb_robson_testnet_db: "robson_testnet"
paradedb_robson_testnet_user: "robson_testnet"

paradedb_truthmetal_db: "truthmetal"
paradedb_truthmetal_user: "truthmetal"

# PowerDNS database (jaguar — used by pdns-database role)
pdns_db_name: "pdns"
pdns_db_user: "pdns"

# ---------------------------------------------------------------------------
# Secrets management
# ---------------------------------------------------------------------------
# pass is the source of truth for all secrets.
# vault.yml (gitignored, same directory) holds the actual values for Ansible.
# Generate vault.yml before running ansible-playbook:
#   bash bootstrap/scripts/init-vault-from-pass.sh
#
# Kubernetes secrets are created by the k8s-secrets role (Phase 8 in site.yml).
# pass key paths used by k8s-secrets defaults are in:
#   bootstrap/ansible/roles/k8s-secrets/defaults/main.yml
#
# Full documentation: docs/infra/SECRETS.md
