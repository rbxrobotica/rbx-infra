---
- name: Install PostgreSQL 16 and dependencies
  apt:
    name:
      - postgresql-16
      - postgresql-client-16
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Configure PostgreSQL to listen on all interfaces
  lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: restart postgresql

- name: Allow k3s nodes to access their databases in pg_hba.conf
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host {{ item.db }} {{ item.user }} {{ item.host }}/32 scram-sha-256"
    insertafter: EOF
  loop:
    # k3s nodes access app databases only
    - { host: "{{ hostvars['tiger'].ansible_host }}", db: "{{ paradedb_robson_db }}", user: "{{ paradedb_robson_user }}" }
    - { host: "{{ hostvars['tiger'].ansible_host }}", db: "{{ paradedb_truthmetal_db }}", user: "{{ paradedb_truthmetal_user }}" }
    - { host: "{{ hostvars['altaica'].ansible_host }}", db: "{{ paradedb_robson_db }}", user: "{{ paradedb_robson_user }}" }
    - { host: "{{ hostvars['altaica'].ansible_host }}", db: "{{ paradedb_truthmetal_db }}", user: "{{ paradedb_truthmetal_user }}" }
    - { host: "{{ hostvars['sumatrae'].ansible_host }}", db: "{{ paradedb_robson_db }}", user: "{{ paradedb_robson_user }}" }
    - { host: "{{ hostvars['sumatrae'].ansible_host }}", db: "{{ paradedb_truthmetal_db }}", user: "{{ paradedb_truthmetal_user }}" }
    - { host: "{{ hostvars['tiger'].ansible_host }}", db: "{{ paradedb_robson_testnet_db }}", user: "{{ paradedb_robson_testnet_user }}" }
    - { host: "{{ hostvars['altaica'].ansible_host }}", db: "{{ paradedb_robson_testnet_db }}", user: "{{ paradedb_robson_testnet_user }}" }
    - { host: "{{ hostvars['sumatrae'].ansible_host }}", db: "{{ paradedb_robson_testnet_db }}", user: "{{ paradedb_robson_testnet_user }}" }
  notify: restart postgresql
  # NOTE: pantera/eagle pg_hba entries are managed by pdns-database role (pdns db only)

- name: Allow localhost connections
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host all all 127.0.0.1/32 scram-sha-256"
    insertafter: EOF
  notify: restart postgresql

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: yes
    state: started

- name: Flush handlers before creating databases
  meta: flush_handlers

- name: Create robson database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ paradedb_robson_db }}"
    encoding: UTF8
    state: present

- name: Create truthmetal database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ paradedb_truthmetal_db }}"
    encoding: UTF8
    state: present

- name: Create robson user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ paradedb_robson_user }}"
    password: "{{ paradedb_robson_password }}"
    state: present

- name: Grant robson user privileges on robson database
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ paradedb_robson_db }}"
    role: "{{ paradedb_robson_user }}"
    type: database
    privs: ALL
    state: present

- name: Create robson_testnet database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ paradedb_robson_testnet_db }}"
    encoding: UTF8
    state: present

- name: Create robson_testnet user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ paradedb_robson_testnet_user }}"
    password: "{{ paradedb_robson_testnet_password }}"
    state: present

- name: Grant robson_testnet user privileges on robson_testnet database
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ paradedb_robson_testnet_db }}"
    role: "{{ paradedb_robson_testnet_user }}"
    type: database
    privs: ALL
    state: present

- name: Grant robson_testnet user CREATE on public schema
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ paradedb_robson_testnet_db }}"
    role: "{{ paradedb_robson_testnet_user }}"
    type: schema
    objs: public
    privs: CREATE,USAGE
    state: present

- name: Create truthmetal user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ paradedb_truthmetal_user }}"
    password: "{{ paradedb_truthmetal_password }}"
    state: present

- name: Grant truthmetal user privileges on truthmetal database
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ paradedb_truthmetal_db }}"
    role: "{{ paradedb_truthmetal_user }}"
    type: database
    privs: ALL
    state: present

- name: Allow ufw port 5432 from k3s cluster nodes only
  ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: "{{ hostvars[item].ansible_host }}"
  loop: "{{ groups['k3s_server'] | default([]) + groups['k3s_agents'] | default([]) }}"
  when: hostvars[item].ansible_host != ansible_host
  # NOTE: pantera firewall rule is managed by pdns-database role
