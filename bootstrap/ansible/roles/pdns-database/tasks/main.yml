---
# Creates the PowerDNS database and user on jaguar (Postgres).
# Runs ONLY on db_server group. Does NOT install PowerDNS itself.

- name: Install python3-psycopg2 (required for Ansible postgresql modules)
  apt:
    name: python3-psycopg2
    state: present

- name: Create pdns database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ pdns_db_name }}"
    encoding: UTF8
    state: present

- name: Create pdns user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ pdns_db_user }}"
    password: "{{ pdns_db_password }}"
    state: present

- name: Grant pdns user privileges on pdns database only
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ pdns_db_name }}"
    role: "{{ pdns_db_user }}"
    type: database
    privs: ALL
    state: present

- name: Allow pantera (DNS primary) to connect to pdns database only
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host {{ pdns_db_name }} {{ pdns_db_user }} {{ hostvars['pantera'].ansible_host }}/32 scram-sha-256"
    insertafter: EOF
  notify: restart postgresql

- name: Allow firewall access from pantera to Postgres
  ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: "{{ hostvars['pantera'].ansible_host }}"
