# ---------------------------------------------------------------------------
# Summary
# ---------------------------------------------------------------------------

- name: Report bootstrap result
  debug:
    msg:
      - "k8s secrets bootstrapped successfully"
      - "  {{ robsond_namespace }}/robsond-secret: database-url + projection-tenant-id"
      - "  {{ robsond_namespace }}/ghcr-pull-secret: ghcr.io pull credentials"
      - "  monitoring/grafana-admin: Grafana admin credentials"
      - "  {{ llm_gateway_namespace }}/litellm-secrets: database-url + master-key + salt-key + provider keys (experimental)"
      - "Tenant ID (new — stored in pass): {{ _robson_tenant_id }}"
  when: tenant_id_existing.rc != 0

- name: Report bootstrap result (existing tenant)
  debug:
    msg:
      - "k8s secrets bootstrapped successfully"
      - "  {{ robsond_namespace }}/robsond-secret: database-url + projection-tenant-id"
      - "  {{ robsond_namespace }}/ghcr-pull-secret: ghcr.io pull credentials"
      - "  monitoring/grafana-admin: Grafana admin credentials"
      - "  {{ llm_gateway_namespace }}/litellm-secrets: database-url + master-key + salt-key + provider keys (experimental)"
  when: tenant_id_existing.rc == 0
