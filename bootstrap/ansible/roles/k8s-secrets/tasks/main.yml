---
# k8s-secrets: Bootstrap Kubernetes secrets from pass.
#
# Runs on localhost (operator machine) after the k3s cluster is up.
# Requires: pass unlocked, ~/.kube/config-rbx present (from k3s-server role).
#
# Idempotent: uses --dry-run=client -o yaml | kubectl apply to avoid errors on re-run.
# See docs/infra/SECRETS.md for the full secrets model and pass namespace structure.
#
# SECRET-VALUE HANDLING (hardening): secret values are NEVER interpolated as
# Jinja directly into the shell command string. They are passed through the
# task `environment:` (Ansible injects them into the process via execve, with no
# shell parsing) and referenced as "$VAR". This makes every value safe for ANY
# character — quotes, backslashes, $, backticks, spaces — independent of how the
# operator generated it. Only non-secret identifiers (namespaces, usernames, DB
# names, validated UUIDs) remain as Jinja in the command. See the hardening note
# in docs/infra/SECRETS.md.

# ---------------------------------------------------------------------------
# Preflight checks
# ---------------------------------------------------------------------------

- name: Check pass is available
  command: which pass
  changed_when: false
  register: pass_check
  failed_when: pass_check.rc != 0

- name: Check kubectl is available
  command: which kubectl
  changed_when: false
  register: kubectl_check
  failed_when: kubectl_check.rc != 0

# ---------------------------------------------------------------------------
# Populate kubeconfig from pass (pass is the source of truth)
# ---------------------------------------------------------------------------

- name: Ensure ~/.kube directory exists
  file:
    path: "{{ kubeconfig_path | dirname }}"
    state: directory
    mode: "0700"

- name: Populate kubeconfig from pass
  shell: pass show {{ pass_kubeconfig_key }} > {{ kubeconfig_path }}
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Restrict kubeconfig permissions
  file:
    path: "{{ kubeconfig_path }}"
    mode: "0600"

# ---------------------------------------------------------------------------
# Read secrets from pass
# ---------------------------------------------------------------------------

- name: Read GHCR token from pass
  command: pass show {{ pass_ghcr_token_key }}
  changed_when: false
  register: ghcr_token_result
  no_log: true

- name: Read rbx-infra image updater git credentials from pass
  command: pass show {{ pass_image_updater_git_credentials_key }}
  changed_when: false
  register: image_updater_git_credentials_result
  no_log: true

- name: Read robsond DB password from pass
  command: pass show {{ pass_robson_db_password_key }}
  changed_when: false
  register: robson_db_password_result
  no_log: true

- name: Try to read robsond projection-tenant-id from pass
  command: pass show {{ pass_robson_tenant_id_key }}
  changed_when: false
  register: tenant_id_existing
  failed_when: false
  no_log: true

- name: Generate and store new projection-tenant-id (first bootstrap only)
  shell: |
    set -e
    NEW_UUID=$(cat /proc/sys/kernel/random/uuid)
    printf '%s' "$NEW_UUID" | pass insert --echo {{ pass_robson_tenant_id_key }} >/dev/null 2>&1
    echo "$NEW_UUID"
  register: tenant_id_new
  when: tenant_id_existing.rc != 0
  no_log: true

- name: Set tenant ID fact
  set_fact:
    _robson_tenant_id: >-
      {{
        (tenant_id_existing.stdout | trim)
        if tenant_id_existing.rc == 0
        else (tenant_id_new.stdout | trim)
      }}

- name: Validate projection-tenant-id is a canonical UUID
  assert:
    that:
      - _robson_tenant_id | regex_search('^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$')
    fail_msg: >-
      projection-tenant-id in pass ({{ pass_robson_tenant_id_key }}) is not a canonical UUID.
      Fix: pass insert {{ pass_robson_tenant_id_key }} (provide a valid lowercase UUID,
      e.g. output of: cat /proc/sys/kernel/random/uuid)

- name: Read robsond Binance API key from pass
  command: pass show {{ pass_robson_binance_api_key }}
  changed_when: false
  register: robson_binance_api_key_result
  no_log: true

- name: Read robsond Binance API secret from pass
  command: pass show {{ pass_robson_binance_api_secret }}
  changed_when: false
  register: robson_binance_api_secret_result
  no_log: true

- name: Read robsond API token from pass
  command: pass show {{ pass_robson_api_token_key }}
  changed_when: false
  register: robson_api_token_result
  no_log: true

# ---------------------------------------------------------------------------
# Ensure namespace exists
# ---------------------------------------------------------------------------

- name: Ensure robson namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace {{ robsond_namespace }}
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

# ---------------------------------------------------------------------------
# argocd namespace secrets (ArgoCD Image Updater)
# ---------------------------------------------------------------------------

- name: Ensure argocd namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace {{ argocd_namespace }}
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Create argocd-image-updater-ghcr in argocd
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry argocd-image-updater-ghcr \
      --namespace {{ argocd_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="$GHCR_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GHCR_TOKEN: "{{ ghcr_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Create ghcr-pull-secret in rbx-identity
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace {{ rbx_identity_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="$GHCR_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GHCR_TOKEN: "{{ ghcr_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Create argocd-image-updater-git-creds in argocd
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic argocd-image-updater-git-creds \
      --namespace {{ argocd_namespace }} \
      --from-literal=type="git" \
      --from-literal=url="https://github.com/rbxrobotica/rbx-infra" \
      --from-literal=username="x-access-token" \
      --from-literal=password="$GIT_CREDS_PASSWORD" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} label --local -f - argocd.argoproj.io/secret-type=repository -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GIT_CREDS_PASSWORD: "{{ image_updater_git_credentials_result.stdout | trim }}"
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# robsond secrets (namespace robson — MIG-v3#2)
# ---------------------------------------------------------------------------

- name: Create robsond-secret in robson
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic robsond-secret \
      --namespace {{ robsond_namespace }} \
      --from-literal=database-url="postgresql://{{ paradedb_robson_user }}:$ROBSON_DB_PASSWORD@robson-paradedb:5432/{{ paradedb_robson_db }}" \
      --from-literal=projection-tenant-id="{{ _robson_tenant_id }}" \
      --from-literal=binance-api-key="$ROBSON_BINANCE_API_KEY" \
      --from-literal=binance-api-secret="$ROBSON_BINANCE_API_SECRET" \
      --from-literal=api-token="$ROBSON_API_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    ROBSON_DB_PASSWORD: "{{ robson_db_password_result.stdout | trim }}"
    ROBSON_BINANCE_API_KEY: "{{ robson_binance_api_key_result.stdout | trim }}"
    ROBSON_BINANCE_API_SECRET: "{{ robson_binance_api_secret_result.stdout | trim }}"
    ROBSON_API_TOKEN: "{{ robson_api_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Create ghcr-pull-secret in robson
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace {{ robsond_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="$GHCR_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GHCR_TOKEN: "{{ ghcr_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# robson-testnet namespace secrets
# Completely independent of the production block above.
# Reads only from rbx/robson-testnet/ pass paths — never from rbx/robson/.
# See docs/ROBSON-TESTNET-ENVIRONMENT.md for the full specification.
# ---------------------------------------------------------------------------

- name: Read testnet Binance API key from pass
  command: pass show {{ pass_robson_testnet_binance_api_key }}
  changed_when: false
  register: robson_testnet_binance_api_key_result
  no_log: true

- name: Read testnet Binance API secret from pass
  command: pass show {{ pass_robson_testnet_binance_api_secret }}
  changed_when: false
  register: robson_testnet_binance_api_secret_result
  no_log: true

- name: Read testnet DB password from pass
  command: pass show {{ pass_robson_testnet_db_password_key }}
  changed_when: false
  register: robson_testnet_db_password_result
  no_log: true

- name: Try to read testnet projection-tenant-id from pass
  command: pass show {{ pass_robson_testnet_tenant_id_key }}
  changed_when: false
  register: testnet_tenant_id_existing
  failed_when: false
  no_log: true

- name: Generate and store new testnet projection-tenant-id (first bootstrap only)
  shell: |
    set -e
    NEW_UUID=$(cat /proc/sys/kernel/random/uuid)
    printf '%s' "$NEW_UUID" | pass insert --echo {{ pass_robson_testnet_tenant_id_key }} >/dev/null 2>&1
    echo "$NEW_UUID"
  register: testnet_tenant_id_new
  when: testnet_tenant_id_existing.rc != 0
  no_log: true

- name: Set testnet tenant ID fact
  set_fact:
    _robson_testnet_tenant_id: >-
      {{
        (testnet_tenant_id_existing.stdout | trim)
        if testnet_tenant_id_existing.rc == 0
        else (testnet_tenant_id_new.stdout | trim)
      }}

- name: Validate testnet projection-tenant-id is a canonical UUID
  assert:
    that:
      - _robson_testnet_tenant_id | regex_search('^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$')
    fail_msg: >-
      testnet projection-tenant-id in pass ({{ pass_robson_testnet_tenant_id_key }}) is not a canonical UUID.
      Fix: pass insert {{ pass_robson_testnet_tenant_id_key }} (provide a valid lowercase UUID,
      e.g. output of: cat /proc/sys/kernel/random/uuid)

- name: Read robsond testnet API token from pass
  command: pass show {{ pass_robson_testnet_api_token_key }}
  changed_when: false
  register: robson_testnet_api_token_result
  no_log: true

- name: Ensure robson-testnet namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace {{ robsond_testnet_namespace }}
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Create robsond-testnet-secret in robson-testnet
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic robsond-testnet-secret \
      --namespace {{ robsond_testnet_namespace }} \
      --from-literal=database-url="postgresql://robson_testnet:$ROBSON_TESTNET_DB_PASSWORD@robson-paradedb.robson-testnet.svc.cluster.local:5432/robson_testnet" \
      --from-literal=projection-tenant-id="{{ _robson_testnet_tenant_id }}" \
      --from-literal=binance-api-key="$ROBSON_TESTNET_BINANCE_API_KEY" \
      --from-literal=binance-api-secret="$ROBSON_TESTNET_BINANCE_API_SECRET" \
      --from-literal=api-token="$ROBSON_TESTNET_API_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    # urlencoded so the password is safe inside the DSN URL (hex passwords make
    # this a no-op, but it preserves the prior behavior for any legacy value).
    ROBSON_TESTNET_DB_PASSWORD: "{{ robson_testnet_db_password_result.stdout | trim | urlencode }}"
    ROBSON_TESTNET_BINANCE_API_KEY: "{{ robson_testnet_binance_api_key_result.stdout | trim }}"
    ROBSON_TESTNET_BINANCE_API_SECRET: "{{ robson_testnet_binance_api_secret_result.stdout | trim }}"
    ROBSON_TESTNET_API_TOKEN: "{{ robson_testnet_api_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Create ghcr-pull-secret in robson-testnet
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace {{ robsond_testnet_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="$GHCR_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GHCR_TOKEN: "{{ ghcr_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# rbx-console namespace secrets (operational console UI)
# Only needs ghcr-pull-secret — the app itself has no runtime secrets in
# Phase 2; future phases that consume APIs will add an app secret here.
# ---------------------------------------------------------------------------

- name: Ensure rbx-console namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace {{ rbx_console_namespace }}
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Create ghcr-pull-secret in rbx-console
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace {{ rbx_console_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="$GHCR_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GHCR_TOKEN: "{{ ghcr_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# rbx-ia-br central vault — reorg services
# ---------------------------------------------------------------------------

- name: Ensure rbx-ia-br namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace {{ rbx_ia_br_namespace }}
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Read rbx-memory token from pass
  command: pass show {{ pass_rbx_memory_token_key }}
  changed_when: false
  register: rbx_memory_token_result
  no_log: true

- name: Read rbx-observability token from pass
  command: pass show {{ pass_rbx_observability_token_key }}
  changed_when: false
  register: rbx_observability_token_result
  no_log: true

# The Langfuse API keys only exist AFTER Langfuse is deployed and a project is
# created in its UI (chicken-egg: rbx-observability needs Langfuse up first).
# So these 3 reads are OPTIONAL — the playbook must still create every OTHER
# secret (including the langfuse-stack secrets that bring Langfuse up) when the
# observability keys are absent. The rbx-observability-langfuse secret below is
# created only once all 3 keys exist (re-run the playbook post-deploy).
- name: Read rbx-observability Langfuse host from pass
  command: pass show {{ pass_rbx_observability_langfuse_host_key }}
  changed_when: false
  failed_when: false
  register: rbx_observability_langfuse_host_result
  no_log: true

- name: Read rbx-observability Langfuse public key from pass
  command: pass show {{ pass_rbx_observability_langfuse_public_key_key }}
  changed_when: false
  failed_when: false
  register: rbx_observability_langfuse_public_key_result
  no_log: true

- name: Read rbx-observability Langfuse secret key from pass
  command: pass show {{ pass_rbx_observability_langfuse_secret_key_key }}
  changed_when: false
  failed_when: false
  register: rbx_observability_langfuse_secret_key_result
  no_log: true

- name: Read rbx-data token from pass
  command: pass show {{ pass_rbx_data_token_key }}
  changed_when: false
  register: rbx_data_token_result
  no_log: true

- name: Read rbx-data warehouse DSN from pass
  command: pass show {{ pass_rbx_data_warehouse_dsn_key }}
  changed_when: false
  register: rbx_data_warehouse_dsn_result
  no_log: true

- name: Read rbx-comms DB password from pass
  command: pass show {{ pass_rbx_comms_db_password_key }}
  changed_when: false
  register: rbx_comms_db_password_result
  no_log: true

- name: Create rbx-memory-token in rbx-ia-br
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic rbx-memory-token \
      --namespace {{ rbx_ia_br_namespace }} \
      --from-literal=token="$RBX_MEMORY_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    RBX_MEMORY_TOKEN: "{{ rbx_memory_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Create rbx-observability-token in rbx-ia-br
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic rbx-observability-token \
      --namespace {{ rbx_ia_br_namespace }} \
      --from-literal=token="$RBX_OBSERVABILITY_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    RBX_OBSERVABILITY_TOKEN: "{{ rbx_observability_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

# Only create this secret once ALL 3 Langfuse keys exist in pass (rc == 0).
# Before Langfuse is deployed + a project created, these keys are absent and the
# reads above return non-zero — this task is then skipped, letting every other
# secret be created so Langfuse itself can be brought up. Re-run post-deploy.
- name: Create rbx-observability-langfuse in rbx-ia-br
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic rbx-observability-langfuse \
      --namespace {{ rbx_ia_br_namespace }} \
      --from-literal=LANGFUSE_HOST="$LF_HOST" \
      --from-literal=LANGFUSE_PUBLIC_KEY="$LF_PUBLIC_KEY" \
      --from-literal=LANGFUSE_SECRET_KEY="$LF_SECRET_KEY" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    LF_HOST: "{{ rbx_observability_langfuse_host_result.stdout | trim }}"
    LF_PUBLIC_KEY: "{{ rbx_observability_langfuse_public_key_result.stdout | trim }}"
    LF_SECRET_KEY: "{{ rbx_observability_langfuse_secret_key_result.stdout | trim }}"
  when:
    - rbx_observability_langfuse_host_result.rc == 0
    - rbx_observability_langfuse_public_key_result.rc == 0
    - rbx_observability_langfuse_secret_key_result.rc == 0
  changed_when: true
  no_log: true

- name: Create rbx-data-token in rbx-ia-br
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic rbx-data-token \
      --namespace {{ rbx_ia_br_namespace }} \
      --from-literal=token="$RBX_DATA_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    RBX_DATA_TOKEN: "{{ rbx_data_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Create rbx-data-warehouse in rbx-ia-br
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic rbx-data-warehouse \
      --namespace {{ rbx_ia_br_namespace }} \
      --from-literal=dsn="$RBX_DATA_WAREHOUSE_DSN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    RBX_DATA_WAREHOUSE_DSN: "{{ rbx_data_warehouse_dsn_result.stdout | trim }}"
  changed_when: true
  no_log: true

# rbx-comms DATABASE_URL is assembled here from the single password SoT
# (pass rbx/comms/db-password) plus non-secret connection params from defaults.
# It MUST be the postgres:// URL form — golang-migrate rejects libpq keyword/DSN
# ("failed to parse scheme from database URL: no scheme") at app startup. Do NOT
# add search_path/options to the URL: the `comms` schema is enforced server-side
# via `ALTER ROLE rbx_comms SET search_path TO comms, public`. The password is
# injected via the environment (never Jinja) and is hex-only per SECRETS.md, so
# it is URL-safe.
- name: Create rbx-comms-secrets in rbx-ia-br
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic rbx-comms-secrets \
      --namespace {{ rbx_ia_br_namespace }} \
      --from-literal=DATABASE_URL="postgres://{{ rbx_comms_db_user }}:${RBX_COMMS_DB_PASSWORD}@{{ rbx_comms_db_host }}:{{ rbx_comms_db_port }}/{{ rbx_comms_db_name }}?sslmode=disable" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    RBX_COMMS_DB_PASSWORD: "{{ rbx_comms_db_password_result.stdout | trim }}"
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# Thalamus slim-down reorg service namespaces — image pull secrets.
# The 3 services run private images from ghcr.io/rbxrobotica/*, so each
# namespace needs ghcr-pull-secret (the app token secrets live in rbx-ia-br
# and are copied in via ExternalSecret; the pull secret is separate).
# ---------------------------------------------------------------------------

- name: Ensure rbx-memory namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace rbx-memory
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Create ghcr-pull-secret in rbx-memory
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace rbx-memory \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="$GHCR_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GHCR_TOKEN: "{{ ghcr_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Ensure rbx-observability namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace rbx-observability
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Create ghcr-pull-secret in rbx-observability
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace rbx-observability \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="$GHCR_TOKEN" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  environment:
    GHCR_TOKEN: "{{ ghcr_token_result.stdout | trim }}"
  changed_when: true
  no_log: true

- name: Ensure rbx-data namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace rbx-data
