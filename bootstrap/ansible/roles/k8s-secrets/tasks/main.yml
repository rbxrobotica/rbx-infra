    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic litellm-secrets \
      --namespace {{ llm_gateway_namespace }} \
      --from-literal=database-url="postgresql://{{ paradedb_litellm_user }}:{{ llm_db_password_result.stdout | trim }}@litellm-postgres:5432/{{ paradedb_litellm_db }}" \
      --from-literal=master-key="{{ llm_master_key_result.stdout | trim }}" \
      --from-literal=salt-key="{{ llm_salt_key_result.stdout | trim }}" \
      --from-literal=groq-api-key="{{ llm_groq_key_result.stdout | trim }}" \
      --from-literal=zai-api-key="{{ llm_zai_key_result.stdout | trim }}" \
      --from-literal=moonshot-api-key="{{ llm_moonshot_key_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

