- name: Create langfuse-s3-auth secret in langfuse
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic langfuse-s3-auth \
      --namespace {{ langfuse_namespace }} \
      --from-literal=accessKeyId="{{ contabo_s3_access_key_result.stdout | trim }}" \
      --from-literal=secretAccessKey="{{ contabo_s3_secret_key_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

