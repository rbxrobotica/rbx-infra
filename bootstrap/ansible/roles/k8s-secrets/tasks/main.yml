---
# k8s-secrets: Bootstrap Kubernetes secrets from pass.
#
# Runs on localhost (operator machine) after the k3s cluster is up.
# Requires: pass unlocked, ~/.kube/config-rbx present (from k3s-server role).
#
# Idempotent: uses --dry-run=client -o yaml | kubectl apply to avoid errors on re-run.
# See docs/infra/SECRETS.md for the full secrets model and pass namespace structure.

# ---------------------------------------------------------------------------
# Preflight checks
# ---------------------------------------------------------------------------

- name: Check pass is available
  command: which pass
  changed_when: false
  register: pass_check
  failed_when: pass_check.rc != 0

- name: Check kubectl is available
  command: which kubectl
  changed_when: false
  register: kubectl_check
  failed_when: kubectl_check.rc != 0

# ---------------------------------------------------------------------------
# Populate kubeconfig from pass (pass is the source of truth)
# ---------------------------------------------------------------------------

- name: Ensure ~/.kube directory exists
  file:
    path: "{{ kubeconfig_path | dirname }}"
    state: directory
    mode: "0700"

- name: Populate kubeconfig from pass
  shell: pass show {{ pass_kubeconfig_key }} > {{ kubeconfig_path }}
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Restrict kubeconfig permissions
  file:
    path: "{{ kubeconfig_path }}"
    mode: "0600"

# ---------------------------------------------------------------------------
# Read secrets from pass
# ---------------------------------------------------------------------------

- name: Read GHCR token from pass
  command: pass show {{ pass_ghcr_token_key }}
  changed_when: false
  register: ghcr_token_result
  no_log: true

- name: Read rbx-infra image updater git credentials from pass
  command: pass show {{ pass_image_updater_git_credentials_key }}
  changed_when: false
  register: image_updater_git_credentials_result
  no_log: true

- name: Read robsond DB password from pass
  command: pass show {{ pass_robson_db_password_key }}
  changed_when: false
  register: robson_db_password_result
  no_log: true

- name: Try to read robsond projection-tenant-id from pass
  command: pass show {{ pass_robson_tenant_id_key }}
  changed_when: false
  register: tenant_id_existing
  failed_when: false
  no_log: true

- name: Generate and store new projection-tenant-id (first bootstrap only)
  shell: |
    set -e
    NEW_UUID=$(cat /proc/sys/kernel/random/uuid)
    printf '%s' "$NEW_UUID" | pass insert --echo {{ pass_robson_tenant_id_key }} >/dev/null 2>&1
    echo "$NEW_UUID"
  register: tenant_id_new
  when: tenant_id_existing.rc != 0
  no_log: true

- name: Set tenant ID fact
  set_fact:
    _robson_tenant_id: >-
      {{
        (tenant_id_existing.stdout | trim)
        if tenant_id_existing.rc == 0
        else (tenant_id_new.stdout | trim)
      }}

- name: Validate projection-tenant-id is a canonical UUID
  assert:
    that:
      - _robson_tenant_id | regex_search('^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$')
    fail_msg: >-
      projection-tenant-id in pass ({{ pass_robson_tenant_id_key }}) is not a canonical UUID.
      Fix: pass insert {{ pass_robson_tenant_id_key }} (provide a valid lowercase UUID,
      e.g. output of: cat /proc/sys/kernel/random/uuid)

- name: Read robsond Binance API key from pass
  command: pass show {{ pass_robson_binance_api_key }}
  changed_when: false
  register: robson_binance_api_key_result
  no_log: true

- name: Read robsond Binance API secret from pass
  command: pass show {{ pass_robson_binance_api_secret }}
  changed_when: false
  register: robson_binance_api_secret_result
  no_log: true

- name: Read robsond API token from pass
  command: pass show {{ pass_robson_api_token_key }}
  changed_when: false
  register: robson_api_token_result
  no_log: true

# ---------------------------------------------------------------------------
# Ensure namespace exists
# ---------------------------------------------------------------------------

- name: Ensure robson namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace {{ robsond_namespace }}
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

# ---------------------------------------------------------------------------
# argocd namespace secrets (ArgoCD Image Updater)
# ---------------------------------------------------------------------------

- name: Ensure argocd namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace {{ argocd_namespace }}
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Create argocd-image-updater-ghcr in argocd
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry argocd-image-updater-ghcr \
      --namespace {{ argocd_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="{{ ghcr_token_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

- name: Create argocd-image-updater-git-creds in argocd
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic argocd-image-updater-git-creds \
      --namespace {{ argocd_namespace }} \
      --from-literal=type="git" \
      --from-literal=url="https://github.com/rbxrobotica/rbx-infra" \
      --from-literal=username="x-access-token" \
      --from-literal=password="{{ image_updater_git_credentials_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} label --local -f - argocd.argoproj.io/secret-type=repository -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# robsond secrets (namespace robson — MIG-v3#2)
# ---------------------------------------------------------------------------

- name: Create robsond-secret in robson
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic robsond-secret \
      --namespace {{ robsond_namespace }} \
      --from-literal=database-url="postgresql://{{ paradedb_robson_user }}:{{ robson_db_password_result.stdout | trim }}@robson-paradedb:5432/{{ paradedb_robson_db }}" \
      --from-literal=projection-tenant-id="{{ _robson_tenant_id }}" \
      --from-literal=binance-api-key="{{ robson_binance_api_key_result.stdout | trim }}" \
      --from-literal=binance-api-secret="{{ robson_binance_api_secret_result.stdout | trim }}" \
      --from-literal=api-token="{{ robson_api_token_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

- name: Create ghcr-pull-secret in robson
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace {{ robsond_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="{{ ghcr_token_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# robson-testnet namespace secrets
# Completely independent of the production block above.
# Reads only from rbx/robson-testnet/ pass paths — never from rbx/robson/.
# See docs/ROBSON-TESTNET-ENVIRONMENT.md for the full specification.
# ---------------------------------------------------------------------------

- name: Read testnet Binance API key from pass
  command: pass show {{ pass_robson_testnet_binance_api_key }}
  changed_when: false
  register: robson_testnet_binance_api_key_result
  no_log: true

- name: Read testnet Binance API secret from pass
