    kubectl --kubeconfig {{ kubeconfig_path }} create secret docker-registry ghcr-pull-secret \
      --namespace {{ rbx_console_namespace }} \
      --docker-server=ghcr.io \
      --docker-username="{{ ghcr_username }}" \
      --docker-password="{{ ghcr_token_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# monitoring namespace secrets (Grafana)
# ---------------------------------------------------------------------------

- name: Read Grafana admin password from pass
  command: pass show {{ pass_grafana_admin_password_key }}
  changed_when: false
  register: grafana_admin_password_result
  no_log: true

- name: Ensure monitoring namespace exists
  shell: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    create namespace monitoring
    --dry-run=client -o yaml
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: false

- name: Create grafana-admin secret in monitoring
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic grafana-admin \
      --namespace monitoring \
      --from-literal=admin-user="admin" \
      --from-literal=admin-password="{{ grafana_admin_password_result.stdout | trim }}" \
      --dry-run=client -o yaml \
    | kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  changed_when: true
  no_log: true

# ---------------------------------------------------------------------------
# llm-gateway namespace secrets (LiteLLM Proxy — experimental)
# ---------------------------------------------------------------------------

- name: Read llm-gateway DB password from pass
  command: pass show {{ pass_llm_gateway_db_password_key }}
  changed_when: false
  register: llm_db_password_result
  no_log: true

- name: Read llm-gateway master key from pass
