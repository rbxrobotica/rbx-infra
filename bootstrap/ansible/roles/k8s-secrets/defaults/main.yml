---
# k8s-secrets role defaults
# See docs/infra/SECRETS.md for the canonical pass namespace structure.

# kubeconfig fetched by k3s-server role
kubeconfig_path: "~/.kube/config-rbx"

# GHCR username for image pulls (rbxrobotica org packages)
ghcr_username: "rbxrobotica"

# Namespace for ArgoCD control-plane secrets
argocd_namespace: "argocd"

# Namespace for robsond secrets
robsond_namespace: "robson"

# pass key paths
pass_kubeconfig_key: "rbx/cluster/kubeconfig"
pass_ghcr_token_key: "rbx/cluster/ghcr-token"
pass_image_updater_git_credentials_key: "rbx/github/rbx-infra-image-updater"
pass_grafana_admin_password_key: "rbx/monitoring/grafana-admin-password"

# Production robson (namespace: robson)
pass_robson_db_password_key: "rbx/robson/db-password"
pass_robson_tenant_id_key: "rbx/robson/projection-tenant-id"
pass_robson_binance_api_key: "rbx/robson/binance-api-key"
pass_robson_binance_api_secret: "rbx/robson/binance-api-secret"
pass_robson_api_token_key: "rbx/robson/api-token"

# Testnet robson (namespace: robson-testnet)
robsond_testnet_namespace: "robson-testnet"
pass_robson_testnet_db_password_key: "rbx/robson-testnet/db-password"
pass_robson_testnet_tenant_id_key: "rbx/robson-testnet/projection-tenant-id"
pass_robson_testnet_binance_api_key: "rbx/robson-testnet/binance-api-key"
pass_robson_testnet_binance_api_secret: "rbx/robson-testnet/binance-api-secret"
pass_robson_testnet_api_token_key: "rbx/robson-testnet/api-token"

# rbx-console (namespace: rbx-console — operational console UI)
# Only ghcr-pull-secret for now; no per-app runtime secrets in Phase 2.
rbx_console_namespace: "rbx-console"

# rbx-ia-br (central vault namespace for reorg service ExternalSecrets)
rbx_ia_br_namespace: "rbx-ia-br"
pass_rbx_memory_token_key: "rbx/memory/token"
pass_rbx_observability_token_key: "rbx/observability/token"
pass_rbx_observability_langfuse_host_key: "rbx/observability/langfuse-host"
pass_rbx_observability_langfuse_public_key_key: "rbx/observability/langfuse-public-key"
pass_rbx_observability_langfuse_secret_key_key: "rbx/observability/langfuse-secret-key"
pass_rbx_data_token_key: "rbx/data/token"
pass_rbx_data_warehouse_dsn_key: "rbx/data/warehouse-dsn"
pass_rbx_session_bff_commerce_client_id_key: "rbx/identity/session-bff-commerce/client-id"
pass_rbx_session_bff_commerce_client_secret_key: "rbx/identity/session-bff-commerce/client-secret"
pass_rbx_session_bff_commerce_audience_key: "rbx/identity/session-bff-commerce/audience"

# rbx-comms (central vault: source DATABASE_URL synced to the rbx-comms ns via
# ExternalSecret). The DB is the in-cluster Service rbx-comms-postgres — a
# ClusterIP with manual Endpoints -> jaguar 161.97.147.76:5432 (Postgres-external).
# DATABASE_URL is assembled from the single password SoT below; it MUST be the
# postgres:// URL form (golang-migrate rejects libpq keyword/DSN as "no scheme").
pass_rbx_comms_db_password_key: "rbx/comms/db-password"
rbx_comms_db_user: "rbx_comms"
rbx_comms_db_host: "rbx-comms-postgres.rbx-comms.svc.cluster.local"
rbx_comms_db_port: "5432"
rbx_comms_db_name: "rbx_comms"

# rbx-commerce sandbox (namespace: rbx-commerce-sandbox — isolated validation)
rbx_commerce_sandbox_namespace: "rbx-commerce-sandbox"
pass_rbx_commerce_sandbox_db_password_key: "rbx/commerce-sandbox/db-password"
pass_rbx_commerce_sandbox_asaas_api_key_key: "rbx/commerce-sandbox/asaas-api-key"
pass_rbx_commerce_sandbox_asaas_webhook_token_key: "rbx/commerce-sandbox/asaas-api-webhook-token"

# llm-gateway (namespace: llm-gateway — LiteLLM Proxy, experimental)
llm_gateway_namespace: "llm-gateway"
pass_llm_gateway_db_password_key: "rbx/llm-gateway/db-password"
pass_llm_gateway_master_key: "rbx/llm-gateway/master-key"
pass_llm_gateway_salt_key: "rbx/llm-gateway/salt-key"
pass_llm_gateway_groq_api_key: "rbx/llm-gateway/groq-api-key"
pass_llm_gateway_zai_api_key: "rbx/llm-gateway/zai-api-key"
pass_llm_gateway_moonshot_api_key: "rbx/llm-gateway/moonshot-api-key"

# Langfuse (namespace: langfuse — self-hosted observability backend)
langfuse_namespace: "langfuse"
pass_langfuse_nextauth_secret_key: "rbx/langfuse/nextauth-secret"
pass_langfuse_salt_key: "rbx/langfuse/salt"
pass_langfuse_encryption_key: "rbx/langfuse/encryption-key"
pass_langfuse_db_password_key: "rbx/langfuse/db-password"
pass_langfuse_clickhouse_password_key: "rbx/langfuse/clickhouse-password"
pass_langfuse_redis_password_key: "rbx/langfuse/redis-password"
pass_contabo_s3_access_key_key: "rbx/s3/access-key"
pass_contabo_s3_secret_key_key: "rbx/s3/secret-key"

# rbx-identity (namespace: rbx-identity — canonical auth / IdP)
rbx_identity_namespace: "rbx-identity"
pass_zitadel_masterkey_key: "rbx/zitadel/masterkey"
pass_zitadel_db_password_key: "rbx/zitadel/db-password"
pass_zitadel_admin_password_key: "rbx/zitadel/admin-password"
