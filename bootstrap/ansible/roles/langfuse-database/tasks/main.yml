---
# Creates the Langfuse database and user on jaguar (Postgres).
# Runs ONLY on db_server group. Does NOT deploy Langfuse itself.

- name: Install python3-psycopg2 (required for Ansible postgresql modules)
  apt:
    name: python3-psycopg2
    state: present

- name: Create langfuse database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ langfuse_db_name }}"
    encoding: UTF8
    state: present

- name: Create langfuse user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ langfuse_db_user }}"
    password: "{{ langfuse_db_password }}"
    state: present

- name: Grant langfuse database-level privileges
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ langfuse_db_name }}"
    role: "{{ langfuse_db_user }}"
    type: database
    privs: ALL
    state: present

- name: Grant langfuse CREATE,USAGE on public schema (PostgreSQL 15+)
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ langfuse_db_name }}"
    role: "{{ langfuse_db_user }}"
    type: schema
    objs: public
    privs: CREATE,USAGE
    state: present

- name: Grant langfuse ALL on existing tables
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ langfuse_db_name }}"
    role: "{{ langfuse_db_user }}"
    type: table
    objs: ALL_IN_SCHEMA
    privs: ALL
    state: present

- name: Grant langfuse ALL on existing sequences
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ langfuse_db_name }}"
    role: "{{ langfuse_db_user }}"
    type: sequence
    objs: ALL_IN_SCHEMA
    privs: ALL
    state: present

- name: Allow k3s nodes to connect to langfuse database only
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host {{ langfuse_db_name }} {{ langfuse_db_user }} {{ hostvars[item].ansible_host }}/32 scram-sha-256"
    insertafter: EOF
  loop: "{{ groups['k3s_server'] + groups['k3s_agents'] }}"
  notify: restart postgresql

- name: Allow firewall access from k3s nodes to Postgres
  ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: "{{ hostvars[item].ansible_host }}"
  loop: "{{ groups['k3s_server'] + groups['k3s_agents'] }}"
