---
# Creates the rbx-data warehouse database and user on jaguar (Postgres).
# Runs ONLY on db_server group. RBX keeps a single Postgres server;
# the warehouse is a new DB inside it.

- name: Install python3-psycopg2 (required for Ansible postgresql modules)
  apt:
    name: python3-psycopg2
    state: present

- name: Create rbx-data warehouse database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ rbx_data_warehouse_db_name }}"
    encoding: UTF8
    state: present

- name: Create rbx-data warehouse user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ rbx_data_warehouse_db_user }}"
    password: "{{ rbx_data_warehouse_db_password }}"
    state: present

- name: Grant rbx-data warehouse user privileges on warehouse database only
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ rbx_data_warehouse_db_name }}"
    role: "{{ rbx_data_warehouse_db_user }}"
    type: database
    privs: ALL
    state: present

- name: Grant rbx-data warehouse user CREATE on public schema (PostgreSQL 15+ requires explicit grant)
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ rbx_data_warehouse_db_name }}"
    role: "{{ rbx_data_warehouse_db_user }}"
    type: schema
    objs: public
    privs: CREATE
    state: present

- name: Allow k3s nodes to connect to the rbx-data warehouse database only
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host {{ rbx_data_warehouse_db_name }} {{ rbx_data_warehouse_db_user }} {{ hostvars[item].ansible_host }}/32 scram-sha-256"
    insertafter: EOF
  loop: "{{ groups['k3s_server'] + groups['k3s_agents'] }}"
  notify: restart postgresql

- name: Allow firewall access from k3s nodes to Postgres
  ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: "{{ hostvars[item].ansible_host }}"
  loop: "{{ groups['k3s_server'] + groups['k3s_agents'] }}"
