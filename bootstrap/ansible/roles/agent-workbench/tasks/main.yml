---
# agent-workbench role — baseline for Corbetti (ADR-0009 Phase 3)
# Requires: agent_loop_runner_key (group_vars/agent_workbench/vault.yml)
#           github_pat             (group_vars/agent_workbench/vault.yml)
#           zai_api_key            (group_vars/agent_workbench/vault.yml)  ← Phase 5
#           maestro_url            (group_vars/agent_workbench/main.yml)
#           runner_id              (group_vars/agent_workbench/main.yml)

- name: Create rbx workspace directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ ansible_env.HOME }}/rbx"
    - "{{ ansible_env.HOME }}/rbx/bin"
    - "{{ ansible_env.HOME }}/rbx/worktrees"
    - "{{ ansible_env.HOME }}/rbx/repos"
    - "{{ ansible_env.HOME }}/rbx/runner"
    - "{{ ansible_env.HOME }}/rbx/logs"
    - "{{ ansible_env.HOME }}/.local/bin"
    - "{{ ansible_env.HOME }}/.lean-ctx"
    - "{{ ansible_env.HOME }}/.claude/hooks"

- name: Write runner env file
  copy:
    dest: "{{ ansible_env.HOME }}/rbx/runner/.env"
    mode: "0600"
    content: |
      AGENT_LOOP_RUNNER_KEY={{ agent_loop_runner_key }}
      MAESTRO_URL={{ maestro_url }}
      RUNNER_ID={{ runner_id }}
      GITHUB_PAT={{ github_pat }}
      CLAUDE_MODEL={{ claude_model | default('claude-haiku-4-5-20251001') }}
      CLAUDE_SONNET_MODEL={{ claude_sonnet_model | default('claude-sonnet-4-5-20251001') }}

- name: Write ZAI API key file (GLM executor, Phase 5)
  copy:
    dest: "{{ ansible_env.HOME }}/rbx/runner/.zai_key"
    content: "{{ zai_api_key }}"
    mode: "0600"

- name: Deploy GLM wrapper script
  copy:
    src: glm
    dest: "{{ ansible_env.HOME }}/rbx/bin/glm"
    mode: "0750"

- name: Install rtk (token-optimized CLI proxy, Phase 5)
  copy:
    src: /home/psyctl/.local/bin/rtk
    dest: "{{ ansible_env.HOME }}/.local/bin/rtk"
    mode: "0755"

- name: Install lean-ctx (context runtime MCP server, Phase 5)
  copy:
    src: /home/psyctl/.local/bin/lean-ctx
    dest: "{{ ansible_env.HOME }}/.local/bin/lean-ctx"
    mode: "0755"

- name: "Write lean-ctx config (privacy-restricted, no telemetry contribution)"
  copy:
    src: lean-ctx-config.toml
    dest: "{{ ansible_env.HOME }}/.lean-ctx/config.toml"
    mode: "0600"
    force: false

- name: Deploy rtk-rewrite hook for Claude Code
  copy:
    src: rtk-rewrite.sh
    dest: "{{ ansible_env.HOME }}/.claude/hooks/rtk-rewrite.sh"
    mode: "0750"

- name: Write Claude Code settings (hooks + lean-ctx MCP permissions)
  copy:
    src: claude-settings.json
    dest: "{{ ansible_env.HOME }}/.claude/settings.json"
    mode: "0644"
    force: true

- name: Register lean-ctx MCP in ~/.claude.json (merge, preserves existing state)
  shell: |
    python3 - <<'PYEOF'
    import json, os
    home = os.path.expanduser('~')
    path = os.path.join(home, '.claude.json')
    try:
        with open(path) as f:
            config = json.load(f)
    except (FileNotFoundError, json.JSONDecodeError):
        config = {}
    entry = {
        'command': os.path.join(home, '.local', 'bin', 'lean-ctx'),
        'env': {'LEAN_CTX_DATA_DIR': os.path.join(home, '.lean-ctx')}
    }
    config.setdefault('mcpServers', {})['lean-ctx'] = entry
    with open(path, 'w') as f:
        json.dump(config, f, indent=2)
    print('lean-ctx registered in ~/.claude.json')
    PYEOF
  register: claude_mcp_result
  changed_when: true

- name: Register lean-ctx MCP with Codex
  shell: |
    export PATH="{{ ansible_env.HOME }}/rbx/bin:{{ ansible_env.HOME }}/rbx/.devbox/nix/profile/default/bin:{{ ansible_env.HOME }}/rbx/.devbox/npm-global/bin:${PATH}"
    if codex mcp list 2>/dev/null | grep -q 'lean-ctx'; then
      echo 'already registered'
    else
      codex mcp add lean-ctx -- "{{ ansible_env.HOME }}/.local/bin/lean-ctx"
      echo 'registered'
    fi
  register: codex_mcp_result
  changed_when: "'registered' == codex_mcp_result.stdout | trim"

- name: Install Kimi Code CLI (Phase 5)
  shell: curl -fsSL https://code.kimi.com/kimi-code/install.sh | bash
  args:
    creates: "{{ ansible_env.HOME }}/.kimi-code/bin/kimi"

- name: Install OpenAI Codex CLI (Phase 5)
  shell: |
    export PATH="${HOME}/rbx/.devbox/nix/profile/default/bin:${HOME}/rbx/.devbox/npm-global/bin:${PATH}"
    npm install -g @openai/codex
  args:
    creates: "{{ ansible_env.HOME }}/rbx/.devbox/npm-global/bin/codex"

- name: Deploy Codex wrapper script (devbox PATH shim)
  copy:
    src: codex
    dest: "{{ ansible_env.HOME }}/rbx/bin/codex"
    mode: "0750"

- name: Deploy runner script
  copy:
    src: rbx-agent-runner.sh
    dest: "{{ ansible_env.HOME }}/rbx/runner/rbx-agent-runner.sh"
    mode: "0750"

- name: Create systemd user service directory
  file:
    path: "{{ ansible_env.HOME }}/.config/systemd/user"
    state: directory
    mode: "0755"

- name: Deploy systemd user service
  copy:
    src: rbx-agent-runner.service
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/rbx-agent-runner.service"
    mode: "0644"

- name: Enable lingering (service survives logout)
  command: loginctl enable-linger {{ ansible_user }}
  changed_when: false

- name: Enable and start agent runner service
  systemd:
    name: rbx-agent-runner.service
    state: started
    enabled: true
    scope: user
    daemon_reload: true
