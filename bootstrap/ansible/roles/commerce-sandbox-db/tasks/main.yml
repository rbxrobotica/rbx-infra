---
# Creates the rbx-commerce sandbox database and user on jaguar (Postgres).
# Runs ONLY on db_server group. The sandbox keeps a separate logical database
# so validation traffic stays isolated from the production commerce database.

- name: Install python3-psycopg2 (required for Ansible postgresql modules)
  apt:
    name: python3-psycopg2
    state: present

- name: Create rbx-commerce sandbox database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ rbx_commerce_sandbox_db_name }}"
    encoding: UTF8
    state: present

- name: Create rbx-commerce sandbox user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ rbx_commerce_sandbox_db_user }}"
    password: "{{ rbx_commerce_sandbox_db_password }}"
    state: present

- name: Grant rbx-commerce sandbox user privileges on sandbox database only
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ rbx_commerce_sandbox_db_name }}"
    role: "{{ rbx_commerce_sandbox_db_user }}"
    type: database
    privs: ALL
    state: present

- name: Grant rbx-commerce sandbox user CREATE,USAGE on public schema (PostgreSQL 15+ requires explicit grant)
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ rbx_commerce_sandbox_db_name }}"
    role: "{{ rbx_commerce_sandbox_db_user }}"
    type: schema
    objs: public
    privs: CREATE,USAGE
    state: present

- name: Grant rbx-commerce sandbox user ALL on existing tables
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ rbx_commerce_sandbox_db_name }}"
    role: "{{ rbx_commerce_sandbox_db_user }}"
    type: table
    objs: ALL_IN_SCHEMA
    privs: ALL
    state: present

- name: Grant rbx-commerce sandbox user ALL on existing sequences
  become: yes
  become_user: postgres
  postgresql_privs:
    db: "{{ rbx_commerce_sandbox_db_name }}"
    role: "{{ rbx_commerce_sandbox_db_user }}"
    type: sequence
    objs: ALL_IN_SCHEMA
    privs: ALL
    state: present

- name: Allow k3s nodes to connect to the rbx-commerce sandbox database only
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host {{ rbx_commerce_sandbox_db_name }} {{ rbx_commerce_sandbox_db_user }} {{ hostvars[item].ansible_host }}/32 scram-sha-256"
    insertafter: EOF
  loop: "{{ groups['k3s_server'] + groups['k3s_agents'] }}"
  notify: restart postgresql

- name: Allow firewall access from k3s nodes to Postgres for rbx-commerce sandbox
  ufw:
    rule: allow
    port: "5432"
    proto: tcp
    src: "{{ hostvars[item].ansible_host }}"
  loop: "{{ groups['k3s_server'] + groups['k3s_agents'] }}"
