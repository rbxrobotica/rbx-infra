---
- name: Install k3s server
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
      --tls-san {{ k3s_server_ip }} \
      --node-name {{ inventory_hostname }} \
      --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s to be ready
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Fetch k3s node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Set k3s token fact for agents
  set_fact:
    k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Fetch kubeconfig
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "~/.kube/config-rbx"
    flat: yes

- name: Fix kubeconfig server address (replace localhost with public IP)
  delegate_to: localhost
  replace:
    path: "~/.kube/config-rbx"
    regexp: "https://127.0.0.1:6443"
    replace: "https://{{ k3s_server_ip }}:6443"

- name: Enable and start k3s
  systemd:
    name: k3s
    enabled: yes
    state: started
