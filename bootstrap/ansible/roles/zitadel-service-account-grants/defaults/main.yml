---
# Default settings for ZITADEL service-account grant bootstrap.

zitadel_management_base_url: "https://auth.merovelis.com"
zitadel_kubeconfig_path: "~/.kube/config-rbx"
zitadel_commerce_service_account_namespace: "rbx-ia-br"
zitadel_commerce_service_account_secret_name: "rbx-session-bff-commerce"
zitadel_login_client_secret_namespace: "rbx-identity"
zitadel_login_client_secret_name: "login-client"
zitadel_admin_pat_secret_namespace: "rbx-identity"
zitadel_admin_pat_secret_name: "iam-admin-pat"
zitadel_commerce_project_audience_prefix: "urn:zitadel:iam:org:project:id:"
zitadel_token_exchange_oidc_app_id: "376903619418523775"
zitadel_token_exchange_oidc_app_name: "Strategos Session BFF (Merovelis)"
zitadel_token_exchange_redirect_uris:
  - "https://app.merovelis.com/api/auth/callback"
  - "https://strategos.rbx.ia.br/api/auth/callback"
  - "https://app.rbxsystems.ch/api/auth/callback"
zitadel_token_exchange_post_logout_redirect_uris:
  - "https://app.merovelis.com/strategos"
  - "https://strategos.rbx.ia.br/"
  - "https://app.rbxsystems.ch/signed-out?source=logout"
