---
# Phase 1: Harden all nodes
# agent_workbench (corbetti) is excluded: it is registered in the inventory
# but not yet managed by this playbook. Its baseline (hardening, runner,
# worktree isolation) is applied deliberately by the agent-loop Phase 3
# work (rbx-governance ADR-0500), not implicitly by a site.yml run —
# resetting ufw/sshd on the active devbox must be an explicit decision.
- name: Harden all nodes
  hosts: all:!agent_workbench
  roles:
    - hardening

# Phase 2: Install k3s control-plane
# serial: 1 ensures tiger (cluster-init) runs first so its node-token is
# available in hostvars before altaica/sumatrae render their join config.
- name: Install k3s server
  hosts: k3s_server
  serial: 1
  roles:
    - k3s-server

# Phase 2b: Configure etcd snapshot sync (tiger → jaguar)
# Runs only on the cluster-init server; sets up a systemd timer that rsyncs
# /var/lib/rancher/k3s/server/db/snapshots/ to jaguar 10 min after each
# k3s etcd snapshot cron (every 6h at :00 → sync at :10).
- name: Configure etcd snapshot sync to jaguar
  hosts: tiger
  roles:
    - k3s-snapshot-sync

# Phase 3: Join workers
- name: Install k3s agents
  hosts: k3s_agents
  roles:
    - k3s-agent

# Phase 4: Install ParadeDB on jaguar (all app databases)
- name: Install ParadeDB
  hosts: db_server
  roles:
    - paradedb

# Phase 5: Create PowerDNS database on jaguar
- name: Setup PowerDNS database
  hosts: db_server
  roles:
    - pdns-database

# Phase 6a: Create rbx-data warehouse database on jaguar
- name: Setup rbx-data warehouse database
  hosts: db_server
  tags: [databases, warehouse]
  roles:
    - rbx-data-warehouse-db

# Phase 6b: Create rbx-commerce sandbox database on jaguar
- name: Setup rbx-commerce sandbox database
  hosts: db_server
  tags: [databases, commerce-sandbox]
  roles:
    - commerce-sandbox-db
# Phase 6c: Create Langfuse database on jaguar
- name: Setup Langfuse database
  hosts: db_server
  tags: [databases, langfuse]
  roles:
    - langfuse-database

# Phase 6d: Create ZITADEL database on jaguar
- name: Setup ZITADEL database
  hosts: db_server
  tags: [databases, zitadel]
  roles:
    - zitadel-database

# Phase 7: Harden DNS servers (DNS-specific firewall)
- name: Harden DNS servers
  hosts: dns_servers
  roles:
    - dns-hardening

# Phase 8: Deploy PowerDNS
- name: Deploy PowerDNS
  hosts: dns_servers
  serial: 1
  roles:
    - pdns

# Phase 9: Install mail server (Mailcow) on lince
- name: Install mail server
  hosts: mail_servers
  roles:
    - mailcow-host

# Phase 10: Bootstrap Kubernetes secrets from pass
# Runs on localhost after k3s and all databases are provisioned.
# Requires: pass unlocked, kubeconfig at ~/.kube/config-rbx
# See docs/infra/SECRETS.md for prerequisites and pass namespace structure.
- name: Bootstrap k8s secrets from pass
  hosts: localhost
  connection: local
  gather_facts: false
  tags: k8s-secrets
  roles:
    - k8s-secrets

# Phase 10b: Ensure ZITADEL service-account grants for product-edge service tokens
- name: Ensure ZITADEL service-account grants
  hosts: localhost
  connection: local
  gather_facts: false
  tags: zitadel-service-account-grants
  roles:
    - zitadel-service-account-grants

# Phase 11: Bootstrap agent workbench (Corbetti) — ADR-0009 Phase 3
# Sets up workspace directories and the runner .env file on Corbetti.
# Deliberately separate from Phase 1 hardening — ufw/sshd changes on the
# active devbox require an explicit operator decision (rbx-governance ADR-0500).
# Requires: group_vars/agent_workbench/vault.yml (generated by init-vault-from-pass.sh)
- name: Bootstrap agent workbench
  hosts: agent_workbench
  become: false
  gather_facts: true
  tags: agent-workbench
  roles:
    - agent-workbench
